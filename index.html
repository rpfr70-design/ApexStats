        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 8, marginBottom: 18 }}>
        {catalogo.map((def) => (
          <button key={def.tipo} disabled={ended || intervalo || !!pendingRegistration} onClick={() => abrirAcao(def)} style={{ background: T.card, border: `1px solid ${T.sep}`, color: T.text, borderRadius: 10, padding: "12px 10px", fontSize: 13, fontWeight: 600, fontFamily: FONT, cursor: (ended || intervalo || pendingRegistration) ? "not-allowed" : "pointer", textAlign: "left", opacity: (ended || intervalo || pendingRegistration) ? 0.4 : 1 }}>{def.emoji} {def.tipo}</button>
        ))}
      </div>

      <div style={{ background: T.card, border: `1px solid ${T.sep}`, borderRadius: 16, padding: "16px 18px", marginBottom: 14 }}>
        <div style={{ fontSize: 13, fontWeight: 800, color: T.sub, marginBottom: 12 }}>📊 ESTATÍSTICAS DA SESSÃO</div>
        {isGR ? (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
            <StatLine label="Passes Curtos" value={`${stats.curtosCertos}/${stats.totalCurtos} (${stats.curtosPercent}%)`} />
            <StatLine label="Passes Longos" value={`${stats.longosCertos}/${stats.totalLongos} (${stats.longosPercent}%)`} />
            <StatLine label="Controlo Profundidade" value={`${stats.controlosComSucesso}/${stats.controlos}`} />
            <StatLine label="Defesas" value={`${stats.defesasRealizadas}/${stats.totalDefesaEventos} (${stats.defesasPercent}%)`} destaque />
            <StatLine label="Golos Sofridos" value={stats.golosSofridos} />
            <StatLine label="Socos" value={`${stats.socosEficazes}/${stats.socos}`} />
            <StatLine label="Duelos Aéreos" value={`${stats.duelosGanhos}/${stats.duelos} (${stats.duelosPercent}%)`} />
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
            <StatLine label="⚽ Golos" value={stats.golos} destaque={stats.golos > 0} />
            <StatLine label="🅰️ Assistências" value={stats.assistencias} destaque={stats.assistencias > 0} />
            <StatLine label="Passes" value={`${stats.passesCertos}/${stats.totalPasses} (${stats.passesPercent}%)`} />
            <StatLine label="🔑 Passes-Chave" value={stats.passesChave} />
            <StatLine label="Remates" value={`${stats.rematesBaliza}/${stats.rematesTotais} (${stats.rematesPercent}%)`} />
            <StatLine label="Conversão" value={`${stats.conversaoPercent}%`} />
            <StatLine label="Interceções" value={stats.intercecoes} />
            <StatLine label="🚫 Fora de Jogo" value={stats.foraDeJogo} />
            <StatLine label="✋ Faltas Cometidas" value={stats.faltasCometidas} />
            <StatLine label="🤕 Faltas Sofridas" value={stats.faltasSofridas} />
            <StatLine label="🟨 Amarelos" value={stats.cartoesAmarelos} />
            <StatLine label="🟥 Vermelhos" value={stats.cartoesVermelhos} />
          </div>
        )}
      </div>

      <button onClick={() => setShowTimeline(true)} style={{ width: "100%", background: T.card, border: `1px solid ${T.sep}`, color: T.text, borderRadius: 12, padding: "10px 0", fontSize: 13, fontWeight: 700, fontFamily: FONT, cursor: "pointer" }}>🕒 Ações Recentes ({acoes.length})</button>

      {ended && <div style={{ marginTop: 14, textAlign: "center", color: T.success, fontSize: 13, fontWeight: 700 }}>✓ Análise guardada.</div>}

      {pickerDef && <DetailSheet def={pickerDef} draft={detalheDraft} setDraft={setDetalheDraft} onConfirm={confirmarDetalhe} onClose={() => setPickerDef(null)} />}

      {showTimeline && (
        <div onClick={() => setShowTimeline(false)} className="gc-backdrop" style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60 }}>
          <div onClick={(e) => e.stopPropagation()} className="gc-sheet-center" style={{ background: "rgba(28,28,30,0.94)", borderRadius: 20, width: 400, maxWidth: "92vw", maxHeight: "75vh", overflowY: "auto", padding: 16, border: "1px solid rgba(255,255,255,0.08)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}><div style={{ fontWeight: 700 }}>Ações Recentes</div><button onClick={() => setShowTimeline(false)} style={{ background: "none", border: "none", color: "#0A84FF", fontFamily: FONT, cursor: "pointer" }}>Fechar</button></div>
            {acoes.length === 0 && <div style={{ color: T.sub, fontSize: 13, textAlign: "center", padding: 20 }}>Ainda sem ações.</div>}
            {acoes.map((a) => (
              <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0", borderBottom: `1px solid ${T.sep}`, fontSize: 12 }}>
                <input type="number" value={a.minuto} onChange={(e) => editarMinuto(a.id, Number(e.target.value) || a.minuto)} style={{ width: 40, background: T.card2, border: `1px solid ${T.sep}`, borderRadius: 6, color: T.text, fontSize: 12, padding: "3px 4px", fontFamily: FONT }} />
                <span style={{ flex: 1 }}>{emojiForIndividual(a.tipo)} {a.tipo}{a.pe ? ` · ${a.pe}` : ""}{a.resultado ? ` · ${a.resultado}` : ""}</span>
                <button onClick={() => eliminarAcao(a.id)} style={{ background: "none", border: "none", color: T.danger, cursor: "pointer", fontSize: 13 }}>🗑</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function RelatorioIndividual({ club, players, opponents, analise, onUpdateAnalise, onEliminar }) {
  const adversario = opponents.find((o) => o.id === analise.adversarioId);
  const isGR = analise.jogadorSnapshot.posicao === "GR";
  const acoes = analise.acoes || [];
  const stats = useMemo(() => (isGR ? calcularStatsGR(acoes) : calcularStatsCampo(acoes)), [acoes, isGR]);
  const [tab, setTab] = useState("total");
  const [selectedDot, setSelectedDot] = useState(null);
  const [obs, setObs] = useState(analise.observacoes || { avaliacao: "", pontosFortes: "", aMelhorar: "", objetivos: "" });
  const mapaTabs = isGR ? MAPA_TABS_GR : MAPA_TABS_CAMPO;
  const activeTab = mapaTabs.find((t) => t.key === tab);
  const mapActions = activeTab ? (activeTab.tipos === null ? acoes : acoes.filter((a) => activeTab.tipos.includes(a.tipo))) : [];
  const eventosOrdenados = [...acoes].sort((a, b) => a.minuto - b.minuto);
  const printColor = "#111111";
  const exportarPDF = () => { if (window.exportarRelatorioPDFBlocos) window.exportarRelatorioPDFBlocos(`Analise_${analise.jogadorSnapshot.nome.replace(/\\s+/g, "_")}_${analise.data || ""}.pdf`); else window.print(); };
  const guardarObs = () => onUpdateAnalise({ ...analise, observacoes: obs });
  const minutosAnalisados = analise.minutosAnalisados || 0;
  const por90 = (v) => (minutosAnalisados > 0 ? Math.round((v / minutosAnalisados) * 90 * 10) / 10 : 0);

  return (
    <div style={{ maxWidth: 720, margin: "0 auto" }}>
      <style>{`@media print { body * { visibility: hidden; } #report-paper, #report-paper * { visibility: visible; } #report-paper { position: absolute; top: 0; left: 0; width: 100%; } }`}</style>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginBottom: 12 }}>
        <button onClick={() => onEliminar(analise.id)} style={{ background: "transparent", color: T.danger, border: `1px solid ${T.danger}`, borderRadius: 12, padding: "10px 18px", fontSize: 13, fontWeight: 700, fontFamily: FONT, cursor: "pointer" }}>Eliminar</button>
        <button onClick={exportarPDF} style={{ background: T.text, color: "#000", border: "none", borderRadius: 12, padding: "10px 18px", fontSize: 13, fontWeight: 700, fontFamily: FONT, cursor: "pointer" }}>Exportar PDF</button>
      </div>

      <div id="report-paper" style={{ background: "#FFFFFF", color: "#111", borderRadius: 18, padding: 24, marginBottom: 24, overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,0.35)" }}>
        <div className="pdf-block">
          <div style={{ textAlign: "center", marginBottom: 20 }}><ReportLogo size={32} /></div>
          <div style={{ background: "linear-gradient(135deg, #111111, #B9873B)", borderRadius: 16, padding: "20px 24px", color: "#fff", textAlign: "center" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 14, marginBottom: 10 }}>
              <div style={{ width: 60, height: 60, borderRadius: 30, background: "#fff", overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center" }}>
                {analise.jogadorSnapshot.foto ? <img src={analise.jogadorSnapshot.foto} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <span style={{ color: "#111", fontWeight: 800 }}>{initials(analise.jogadorSnapshot.nome)}</span>}
              </div>
              <div style={{ textAlign: "left" }}>
                <div style={{ fontSize: 18, fontWeight: 800 }}>{analise.jogadorSnapshot.nome}</div>
                <div style={{ fontSize: 12, opacity: 0.85 }}>#{analise.jogadorSnapshot.numero} · {analise.jogadorSnapshot.posicao} · {club.nome}</div>
              </div>
            </div>
            <div style={{ fontSize: 11, opacity: 0.9 }}>
              {analise.data || "Data por definir"} · {analise.local || "Local por definir"} · {analise.competicao || analise.tipoSessao}
              {adversario ? ` · vs ${adversario.nome}` : ""}{analise.tipoSessao === "Jogo" ? ` · ${analise.scoreManual?.casa ?? 0}:${analise.scoreManual?.fora ?? 0}` : ""}
            </div>
            <div style={{ fontSize: 11, opacity: 0.9, marginTop: 4 }}>⏱ {minutosAnalisados} minutos analisados</div>
          </div>
        </div>

        <div className="pdf-block" style={{ marginTop: 24 }}>
          <div style={{ fontSize: 14, fontWeight: 800, color: printColor, borderLeft: `4px solid ${printColor}`, paddingLeft: 10, marginBottom: 14 }}>📊 Resumo de Desempenho</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
            {(isGR ? [
              ["Passe Curto", `${stats.curtosPercent}%`], ["Passe Longo", `${stats.longosPercent}%`], ["Defesas", stats.defesasRealizadas],
              ["% Defesas", `${stats.defesasPercent}%`], ["Controlo Prof.", stats.controlosComSucesso], ["Duelos Ganhos", stats.duelosGanhos],
            ] : [
              ["Golos", stats.golos], ["Assistências", stats.assistencias], ["% Passe", `${stats.passesPercent}%`],
              ["Passes-Chave", stats.passesChave], ["Remates", stats.rematesTotais], ["Interceções", stats.intercecoes],
            ]).map(([label, val]) => (
              <div key={label} style={{ background: "#fafafa", border: "1px solid #eee", borderRadius: 12, padding: "12px 8px", textAlign: "center", boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
                <div style={{ fontSize: 18, fontWeight: 800 }}>{val}</div>
                <div style={{ fontSize: 9, color: "#888", fontWeight: 700, textTransform: "uppercase", marginTop: 2 }}>{label}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="pdf-block" style={{ marginTop: 24 }}>
          <div style={{ fontSize: 14, fontWeight: 800, color: printColor, borderLeft: `4px solid ${printColor}`, paddingLeft: 10, marginBottom: 14 }}>📈 Estatísticas Detalhadas</div>
          <div style={{ background: "#fafafa", border: "1px solid #eee", borderRadius: 12, padding: 16, fontSize: 12, boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
            {isGR ? (
              <table style={{ width: "100%", borderCollapse: "collapse" }}><tbody>
                {[["Passes Curtos", `${stats.curtosCertos} certos / ${stats.curtosErrados} errados (${stats.curtosPercent}%)`],
                  ["Passes Longos", `${stats.longosCertos} certos / ${stats.longosErrados} errados (${stats.longosPercent}%)`],
                  ["Controlo de Profundidade", `${stats.controlosComSucesso} com sucesso / ${stats.controlosSemSucesso} sem sucesso`],
                  ["Defesas", `${stats.defesasRealizadas} realizadas / ${stats.totalDefesaEventos} remates enquadrados (${stats.defesasPercent}%)`],
                  ["Golos Sofridos", stats.golosSofridos],
                  ["Socos", `${stats.socosEficazes} eficazes / ${stats.socosIneficazes} ineficazes`],
                  ["Duelos Aéreos", `${stats.duelosGanhos} ganhos / ${stats.duelosPerdidos} perdidos (${stats.duelosPercent}%)`],
                ].map((row) => <tr key={row[0]}><td style={{ padding: 6, color: "#666" }}>{row[0]}</td><td style={{ padding: 6, textAlign: "right", fontWeight: 700 }}>{row[1]}</td></tr>)}
              </tbody></table>
            ) : (
              <table style={{ width: "100%", borderCollapse: "collapse" }}><tbody>
                {[["Golos", stats.golos], ["Assistências", stats.assistencias], ["Participações em Golo", stats.participacoesGolo],
                  ["Passes", `${stats.passesCertos} certos / ${stats.passesErrados} errados (${stats.passesPercent}%)`],
                  ["Passes-Chave", stats.passesChave],
                  ["Remates", `${stats.rematesBaliza} à baliza / ${stats.rematesFora} para fora (${stats.rematesPercent}% enquadramento)`],
                  ["Conversão de Remates", `${stats.conversaoPercent}%`],
                  ["Interceções", `${stats.intercecoesComPosse} com posse / ${stats.intercecoesSemPosse} sem posse`],
                  ["Fora de Jogo", stats.foraDeJogo], ["Autogolos", stats.autogolos],
                  ["Faltas", `${stats.faltasCometidas} cometidas / ${stats.faltasSofridas} sofridas`],
                  ["Cartões", `🟨 ${stats.cartoesAmarelos} · 🟥 ${stats.cartoesVermelhos}`],
                ].map((row) => <tr key={row[0]}><td style={{ padding: 6, color: "#666" }}>{row[0]}</td><td style={{ padding: 6, textAlign: "right", fontWeight: 700 }}>{row[1]}</td></tr>)}
              </tbody></table>
            )}
            {minutosAnalisados > 0 && !isGR && (
              <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid #e5e5e5", fontSize: 10, color: "#999" }}>Por 90 minutos: {por90(stats.golos)} golos · {por90(stats.assistencias)} assistências · {por90(stats.rematesTotais)} remates</div>
            )}
          </div>
        </div>

        <div className="pdf-block" style={{ marginTop: 24 }}>
          <div style={{ fontSize: 14, fontWeight: 800, color: printColor, borderLeft: `4px solid ${printColor}`, paddingLeft: 10, marginBottom: 14 }}>🕒 Linha Temporal</div>
          <div style={{ border: "1px solid #eee", borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
              <thead><tr>{["Tempo", "Ação", "Detalhe"].map((h) => <th key={h} style={{ background: printColor, color: "#fff", padding: 7 }}>{h}</th>)}</tr></thead>
              <tbody>{eventosOrdenados.map((a, i) => <tr key={a.id} style={{ background: i % 2 ? "#fafafa" : "#fff" }}><td style={{ padding: 6, textAlign: "center" }}>{a.minuto}'</td><td style={{ padding: 6, textAlign: "center" }}>{emojiForIndividual(a.tipo)} {a.tipo}</td><td style={{ padding: 6, textAlign: "center" }}>{[a.pe, a.resultado, a.extra].filter(Boolean).join(" · ") || "—"}</td></tr>)}</tbody>
            </table>
          </div>
        </div>

        <div className="pdf-block" style={{ marginTop: 24 }}>
          <div style={{ fontSize: 14, fontWeight: 800, color: printColor, borderLeft: `4px solid ${printColor}`, paddingLeft: 10, marginBottom: 14 }}>📝 Observações do Treinador</div>
          <div style={{ background: "#fafafa", border: "1px solid #eee", borderRadius: 12, padding: 14, fontSize: 12, boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
            {[["avaliacao", "Avaliação geral"], ["pontosFortes", "Pontos fortes"], ["aMelhorar", "Aspetos a melhorar"], ["objetivos", "Objetivos para o próximo jogo"]].map(([key, label]) => (
              <div key={key} style={{ marginBottom: 8 }}>
                <div style={{ fontWeight: 700, color: "#666", marginBottom: 2 }}>{label}</div>
                <div>{obs[key] || "—"}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="pdf-block" style={{ textAlign: "center", marginTop: 10, paddingTop: 18, borderTop: "1px solid #eee" }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2.5, textTransform: "uppercase", background: "linear-gradient(135deg, #F2D48A, #B9873B)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text" }}>Analyze. Perform. Win.</div>
        </div>
      </div>

      <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 10 }}>Mapa de Ações</div>
      <div style={{ display: "flex", gap: 6, overflowX: "auto", marginBottom: 12, paddingBottom: 4 }}>
        {mapaTabs.map((t) => <button key={t.key} onClick={() => setTab(t.key)} style={{ whiteSpace: "nowrap", background: tab === t.key ? T.text : T.card, color: tab === t.key ? "#000" : T.text, border: `1px solid ${T.sep}`, borderRadius: 10, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>{t.label}</button>)}
      </div>
      <div style={{ position: "relative", width: "100%", maxWidth: 620, aspectRatio: "100 / 62", background: "#2e7d32", border: `1px solid ${T.sep}`, borderRadius: 12, margin: "0 auto 26px" }}>
        <GrassStripes />
        <PitchLinesHorizontal />
        {mapActions.map((a) => (
          <div key={a.id} onClick={() => setSelectedDot(a)} style={{ position: "absolute", left: `${a.x}%`, top: `${a.y}%`, transform: "translate(-50%,-50%)", width: 22, height: 22, borderRadius: 11, cursor: "pointer", background: "#D8B26A", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, border: "1px solid rgba(0,0,0,0.4)" }}>{emojiForIndividual(a.tipo)}</div>
        ))}
        {mapActions.length === 0 && <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12 }}>Sem ações deste tipo.</div>}
      </div>

      <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 10 }}>📝 Observações do Treinador</div>
      <div style={{ background: T.card, border: `1px solid ${T.sep}`, borderRadius: 16, padding: 16, marginBottom: 24 }}>
        {[["avaliacao", "Avaliação geral"], ["pontosFortes", "Pontos fortes"], ["aMelhorar", "Aspetos a melhorar"], ["objetivos", "Objetivos para o próximo jogo"]].map(([key, label]) => (
          <div key={key} style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 12, color: T.sub, marginBottom: 6, fontWeight: 600 }}>{label}</div>
            <textarea value={obs[key]} onChange={(e) => setObs({ ...obs, [key]: e.target.value })} rows={2} style={{ ...inputStyle, resize: "vertical", fontFamily: FONT }} />
          </div>
        ))}
        <PrimaryBtn onClick={guardarObs}>Guardar Observações</PrimaryBtn>
      </div>

      {selectedDot && (
        <div onClick={() => setSelectedDot(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60 }}>
          <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 16, padding: 20, width: 280, maxWidth: "90vw" }}>
            <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 10 }}>{emojiForIndividual(selectedDot.tipo)} {selectedDot.tipo}</div>
            {selectedDot.resultado && <div style={{ fontSize: 13, color: T.sub, marginBottom: 4 }}>Resultado: <span style={{ color: T.text }}>{selectedDot.resultado}</span></div>}
            {selectedDot.pe && <div style={{ fontSize: 13, color: T.sub, marginBottom: 4 }}>Pé: <span style={{ color: T.text }}>{selectedDot.pe}</span></div>}
            {selectedDot.extra && <div style={{ fontSize: 13, color: T.sub, marginBottom: 4 }}>Detalhe: <span style={{ color: T.text }}>{selectedDot.extra}</span></div>}
            <div style={{ fontSize: 13, color: T.sub }}>Minuto: <span style={{ color: T.text }}>{selectedDot.minuto}'</span></div>
          </div>
        </div>
      )}
    </div>
  );
}

function AnaliseIndividualTab({ club, players, opponents, analises, setAnalises, accent }) {
  const [view, setView] = useState("lista");
  const [liveId, setLiveId] = useState(null);
  const [reportId, setReportId] = useState(null);
  const liveAnalise = analises.find((a) => a.id === liveId);
  const reportAnalise = analises.find((a) => a.id === reportId);

  const criarAnalise = (nova) => { setAnalises([...analises, nova]); setLiveId(nova.id); setView("ao-vivo"); };
  const terminarAnalise = (atualizada) => { setAnalises(analises.map((a) => (a.id === atualizada.id ? atualizada : a))); setReportId(atualizada.id); setView("relatorio"); };
  const atualizarAnalise = (atualizada) => setAnalises(analises.map((a) => (a.id === atualizada.id ? atualizada : a)));
  const atualizarAnaliseAoVivo = (parcial) => setAnalises(analises.map((a) => (a.id === parcial.id ? { ...a, ...parcial } : a)));
  const eliminarAnalise = (id) => { setAnalises(analises.filter((a) => a.id !== id)); setView("lista"); };

  if (view === "config") return <ConfigIndividual club={club} players={players} opponents={opponents} accent={accent} onCriar={criarAnalise} onCancel={() => setView("lista")} />;
  if (view === "ao-vivo" && liveAnalise) return <AnaliseAoVivo club={club} players={players} opponents={opponents} analise={liveAnalise} accent={accent} onTerminar={terminarAnalise} onAtualizar={atualizarAnaliseAoVivo} onVoltar={() => setView("lista")} />;
  if (view === "relatorio" && reportAnalise) return (
    <>
      <GhostBtn onClick={() => setView("lista")}>‹ Análise Individual</GhostBtn>
      <div style={{ marginTop: 10 }}><RelatorioIndividual club={club} players={players} opponents={opponents} analise={reportAnalise} onUpdateAnalise={atualizarAnalise} onEliminar={eliminarAnalise} /></div>
    </>
  );

  return (
    <>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 15, fontWeight: 700 }}>Análise Individual</div>
        <button onClick={() => setView("config")} style={{ width: 34, height: 34, borderRadius: 17, background: T.card, border: `1px solid ${T.sep}`, color: T.text, fontSize: 18, cursor: "pointer", fontFamily: FONT }}>+</button>
      </div>
      {analises.length === 0 && <div style={{ textAlign: "center", color: T.sub, padding: 30, fontSize: 14 }}>Ainda sem análises individuais. Toca em "+" para configurar a primeira.</div>}
      {[...analises].reverse().map((a) => {
        const adv = opponents.find((o) => o.id === a.adversarioId);
        const done = !!a.terminadoEm;
        return (
          <div key={a.id} onClick={() => { if (done) { setReportId(a.id); setView("relatorio"); } else { setLiveId(a.id); setView("ao-vivo"); } }} style={{ display: "flex", alignItems: "center", gap: 14, background: T.card, border: `1px solid ${T.sep}`, borderRadius: 16, padding: 14, marginBottom: 10, cursor: "pointer" }}>
            <Avatar label={initials(a.jogadorSnapshot.nome)} photo={a.jogadorSnapshot.foto} size={40} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 700 }}>{a.jogadorSnapshot.nome} <span style={{ color: T.sub, fontWeight: 500 }}>#{a.jogadorSnapshot.numero}</span></div>
              <div style={{ fontSize: 12, color: T.sub }}>{a.tipoSessao}{adv ? ` · vs ${adv.nome}` : ""} · {a.data || "sem data"}</div>
            </div>
            {done ? <span style={{ fontSize: 11, fontWeight: 700, color: T.success, background: "rgba(48,209,88,0.15)", padding: "4px 10px", borderRadius: 8 }}>Concluída</span> : <span style={{ fontSize: 11, fontWeight: 700, color: T.warning, background: "rgba(255,214,10,0.15)", padding: "4px 10px", borderRadius: 8 }}>Em curso</span>}
          </div>
        );
      })}
    </>
  );
}

const PLANO_TIPOS = ["Canto", "Livre Direto", "Livre Indireto", "Lateral", "Penálti", "Outro"];

function TokenView({ token, player, accent, onPointerDownToken, onRemove, size = 34 }) {
  let content;
  if (token.tipo === "bola") {
    content = <div style={{ fontSize: size * 0.55, lineHeight: 1, filter: "drop-shadow(0 2px 3px rgba(0,0,0,0.5))" }}>⚽</div>;
  } else if (token.tipo === "adversario") {
    content = <div style={{ width: size, height: size, borderRadius: size / 2, background: "#111111", display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.4, fontWeight: 800, color: "#fff", border: "2px solid #fff", boxShadow: "0 2px 5px rgba(0,0,0,0.35)" }}>A</div>;
  } else if (token.tipo === "marcador") {
    content = <div style={{ width: size * 0.85, height: size * 0.85, borderRadius: size * 0.425, background: "#fff", border: "2px solid #fff", boxShadow: "0 2px 5px rgba(0,0,0,0.35)" }} />;
  } else {
    content = <Avatar label={initials(player?.nome)} photo={player?.foto} size={size} bg={accent || "#0A84FF"} />;
  }
  return (
    <div onPointerDown={onPointerDownToken} style={{ position: "absolute", left: `${token.x}%`, top: `${token.y}%`, transform: "translate(-50%,-50%)", cursor: "grab", touchAction: "none" }}>
      <div style={{ position: "relative" }}>
        {content}
        {token.tipo === "proprio" && player && <div style={{ position: "absolute", bottom: -4, right: -6, background: "#111", color: "#fff", fontSize: 9, fontWeight: 800, borderRadius: 8, padding: "1px 4px", border: "1px solid #fff" }}>{player.numero}</div>}
        <div onClick={(e) => { e.stopPropagation(); onRemove(); }} style={{ position: "absolute", top: -6, right: -6, width: 16, height: 16, borderRadius: 8, background: T.danger, color: "#000", fontSize: 10, fontWeight: 900, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>✕</div>
      </div>
    </div>
  );
}

function PlanoTaticoEditor({ club, players, plano, onGuardar, onCancelar }) {
  const accent = accessibleAccent(club?.corPrimaria);
  const [nome, setNome] = useState(plano?.nome || "");
  const [tipo, setTipo] = useState(plano?.tipo || "Canto");
  const [campo, setCampo] = useState(plano?.campo || "meio");
  const [tokens, setTokens] = useState(plano?.tokens || []);
  const [selecionado, setSelecionado] = useState(null);
  const [arrastando, setArrastando] = useState(null);
  const fieldRef = useRef(null);

  const posicaoEvento = (e) => {
    const rect = fieldRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: Math.min(100, Math.max(0, ((clientX - rect.left) / rect.width) * 100)),
      y: Math.min(100, Math.max(0, ((clientY - rect.top) / rect.height) * 100)),
    };
  };
  const tocarCampo = (e) => {
    if (arrastando || !selecionado) return;
    const { x, y } = posicaoEvento(e);
    setTokens((prev) => [...prev, { id: uid(), ...selecionado, x, y }]);
    setSelecionado(null);
  };
  const moverPointer = (e) => {
    if (!arrastando) return;
    const { x, y } = posicaoEvento(e);
    setTokens((prev) => prev.map((t) => (t.id === arrastando ? { ...t, x, y } : t)));
  };
  const largarPointer = () => setArrastando(null);
  const removerToken = (id) => setTokens((prev) => prev.filter((t) => t.id !== id));
  const limpar = () => setTokens([]);
  const guardar = () => {
    if (!nome.trim()) return;
    onGuardar({ id: plano?.id || uid(), nome: nome.trim(), tipo, campo, tokens, criadoEm: plano?.criadoEm || new Date().toISOString() });
  };

  return (
    <div style={{ maxWidth: 880, margin: "0 auto" }}>
      <GhostBtn onClick={onCancelar}>‹ Bolas Paradas</GhostBtn>

      <div style={{ marginTop: 10, marginBottom: 14 }}>
        <input style={inputStyle} placeholder="Nome do plano (ex: Canto direito, zona)" value={nome} onChange={(e) => setNome(e.target.value)} />
      </div>

      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
        {PLANO_TIPOS.map((t) => (
          <div key={t} onClick={() => setTipo(t)} style={{ padding: "7px 12px", borderRadius: 10, fontSize: 12, fontWeight: 700, cursor: "pointer", background: tipo === t ? T.text : T.card, color: tipo === t ? "#000" : T.text, border: `1px solid ${T.sep}` }}>{t}</div>
        ))}
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <div onClick={() => setCampo("inteiro")} style={{ flex: 1, textAlign: "center", padding: "9px 0", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: "pointer", background: campo === "inteiro" ? T.text : T.card, color: campo === "inteiro" ? "#000" : T.text, border: `1px solid ${T.sep}` }}>🏟️ Campo Inteiro</div>
        <div onClick={() => setCampo("meio")} style={{ flex: 1, textAlign: "center", padding: "9px 0", borderRadius: 12, fontSize: 13, fontWeight: 700, cursor: "pointer", background: campo === "meio" ? T.text : T.card, color: campo === "meio" ? "#000" : T.text, border: `1px solid ${T.sep}` }}>⚽ Meio Campo</div>
      </div>

      <div style={{ fontSize: 11, color: T.sub, textAlign: "center", marginBottom: 8 }}>
        {selecionado ? "Toca no campo para colocar" : "Escolhe um jogador/marcador em baixo e depois toca no campo · arrasta para ajustar"}
      </div>

      <div ref={fieldRef} onClick={tocarCampo} onPointerMove={moverPointer} onPointerUp={largarPointer} onPointerLeave={largarPointer}
        style={{ position: "relative", width: "100%", aspectRatio: campo === "inteiro" ? "100 / 62" : "1.24", background: "#2e7d32", border: selecionado ? `2px solid ${T.warning}` : `1px solid ${T.sep}`, borderRadius: 12, overflow: "hidden", marginBottom: 16, cursor: selecionado ? "crosshair" : "default", touchAction: "none" }}>
        <GrassStripes />
        {campo === "inteiro" ? <PitchLinesHorizontal /> : <PitchHalfLines />}
        {tokens.map((t) => (
          <TokenView key={t.id} token={t} player={t.tipo === "proprio" ? players.find((p) => p.id === t.jogadorId) : null} accent={accent}
            onPointerDownToken={(e) => { e.stopPropagation(); setArrastando(t.id); }} onRemove={() => removerToken(t.id)} />
        ))}
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: T.sub }}>PLANTEL</div>
        <button onClick={limpar} style={{ background: "none", border: "none", color: T.danger, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>Limpar campo</button>
      </div>
      <div style={{ display: "flex", gap: 10, overflowX: "auto", paddingBottom: 8, marginBottom: 14 }}>
        <div onClick={() => setSelecionado({ tipo: "bola" })} style={{ flexShrink: 0, textAlign: "center", cursor: "pointer" }}>
          <div style={{ width: 40, height: 40, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, borderRadius: 20, border: selecionado?.tipo === "bola" ? `2px solid ${T.warning}` : "2px solid transparent" }}>⚽</div>
          <div style={{ fontSize: 9, color: T.sub, marginTop: 3 }}>Bola</div>
        </div>
        <div onClick={() => setSelecionado({ tipo: "adversario" })} style={{ flexShrink: 0, textAlign: "center", cursor: "pointer" }}>
          <div style={{ width: 40, height: 40, borderRadius: 20, background: "#111111", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, fontWeight: 800, color: "#fff", border: selecionado?.tipo === "adversario" ? `2px solid ${T.warning}` : "2px solid #fff" }}>A</div>
          <div style={{ fontSize: 9, color: T.sub, marginTop: 3 }}>Adversário</div>
        </div>
        <div onClick={() => setSelecionado({ tipo: "marcador" })} style={{ flexShrink: 0, textAlign: "center", cursor: "pointer" }}>
          <div style={{ width: 40, height: 40, borderRadius: 20, background: T.card2, display: "flex", alignItems: "center", justifyContent: "center", border: selecionado?.tipo === "marcador" ? `2px solid ${T.warning}` : `2px solid ${T.sep}` }}>
            <div style={{ width: 20, height: 20, borderRadius: 10, background: "#fff", border: "2px solid #fff" }} />
          </div>
          <div style={{ fontSize: 9, color: T.sub, marginTop: 3 }}>Marcador</div>
        </div>
        {players.map((p) => (
          <div key={p.id} onClick={() => setSelecionado({ tipo: "proprio", jogadorId: p.id })} style={{ flexShrink: 0, textAlign: "center", cursor: "pointer" }}>
            <div style={{ borderRadius: "50%", border: selecionado?.tipo === "proprio" && selecionado?.jogadorId === p.id ? `2px solid ${T.warning}` : "2px solid transparent" }}>
              <Avatar label={initials(p.nome)} photo={p.foto} size={40} bg={accent} />
            </div>
            <div style={{ fontSize: 9, color: T.sub, marginTop: 3, maxWidth: 44, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome?.split(" ")[0]}</div>
          </div>
        ))}
      </div>

      <PrimaryBtn disabled={!nome.trim()} onClick={guardar}>Guardar Plano</PrimaryBtn>
    </div>
  );
}

function BolasParadasTab({ club, players, planos, setPlanos }) {
  const [editando, setEditando] = useState(null);

  const guardarPlano = (plano) => {
    const existe = planos.some((p) => p.id === plano.id);
    setPlanos(existe ? planos.map((p) => (p.id === plano.id ? plano : p)) : [...planos, plano]);
    setEditando(null);
  };
  const eliminarPlano = (id) => setPlanos(planos.filter((p) => p.id !== id));
  const planoRelatorio = planos.find((p) => p.id === relatorioId);

  if (relatorioId && planoRelatorio) return <RelatorioBolaParada club={club} players={players} plano={planoRelatorio} onVoltar={() => setRelatorioId(null)} />;

const WELLNESS_NIVEIS = {
  sono: ["Muito má", "Má", "Fraca", "Razoável", "Boa", "Muito boa", "Excelente"],
  fadiga: ["Muito elevada", "Elevada", "Alguma", "Moderada", "Reduzida", "Quase nenhuma", "Sem fadiga"],
  dorMuscular: ["Muito elevada", "Elevada", "Alguma", "Moderada", "Ligeira", "Quase nenhuma", "Sem dor"],
  stress: ["Muito elevado", "Elevado", "Algum", "Moderado", "Reduzido", "Quase nenhum", "Sem stress"],
};
const WELLNESS_LABELS = { sono: "😴 Sono", fadiga: "🔋 Fadiga", dorMuscular: "💪 Dor Muscular", stress: "🧠 Stress" };
const PSE_TIPOS = ["Treino", "Jogo", "Recuperação", "Ginásio", "Sessão Individual", "Reabilitação", "Complementar", "Outro"];
const PSE_NIVEIS = ["Repouso", "Muito leve", "Leve", "Moderado", "Algo intenso", "Intenso", "Intenso", "Muito intenso", "Muito intenso", "Extremo", "Máximo"];

function calcWellnessTotal(e) { return (e.sono || 0) + (e.fadiga || 0) + (e.dorMuscular || 0) + (e.stress || 0); }
function classificarWellness(total) {
  if (total >= 23) return { label: "Muito bom", color: "#30D158" };
  if (total >= 17) return { label: "Bom", color: "#64D2FF" };
  if (total >= 11) return { label: "Atenção", color: "#FFD60A" };
  return { label: "Risco elevado", color: "#FF453A" };
}
function calcCarga(duracao, pse) { return (Number(duracao) || 0) * (Number(pse) || 0); }
function hojeISO() { return new Date().toISOString().slice(0, 10); }
function upsertEntry(lista, jogadorId, data, patch, autor) {
  const idx = lista.findIndex((e) => e.jogadorId === jogadorId && e.data === data);
  if (idx >= 0) { const novo = [...lista]; novo[idx] = { ...novo[idx], ...patch, atualizadoEm: new Date().toISOString(), ...(autor ? { atualizadoPor: autor } : {}) }; return novo; }
  return [...lista, { id: uid(), jogadorId, data, ...patch, criadoEm: new Date().toISOString(), ...(autor ? { criadoPor: autor, atualizadoPor: autor } : {}) }];
}
function statusAtleta(wellnessEntry) {
  if (!wellnessEntry) return { label: "Sem dados", color: T.sub };
  const total = calcWellnessTotal(wellnessEntry);
  const nota = wellnessEntry.notaGeral;
  if (total <= 10 || (nota != null && nota <= 3)) return { label: "Risco elevado", color: "#FF453A" };
  if (total <= 16 || (nota != null && nota <= 5)) return { label: "Atenção", color: "#FFD60A" };
  return { label: "Disponível", color: "#30D158" };
}

const PERIODO_PRESETS = [["hoje", "Hoje"], ["ontem", "Ontem"], ["7dias", "Últ. 7 dias"], ["30dias", "Últ. 30 dias"], ["semana", "Semana Atual"], ["mes", "Mês Atual"], ["custom", "Personalizado"]];
function isoData(d) { return d.toISOString().slice(0, 10); }
function addDias(d, n) { const c = new Date(d); c.setDate(c.getDate() + n); return c; }
function calcularIntervalo(preset, custom) {
  const hoje = new Date();
  switch (preset) {
    case "hoje": return { inicio: isoData(hoje), fim: isoData(hoje) };
    case "ontem": { const o = addDias(hoje, -1); return { inicio: isoData(o), fim: isoData(o) }; }
    case "7dias": return { inicio: isoData(addDias(hoje, -6)), fim: isoData(hoje) };
    case "30dias": return { inicio: isoData(addDias(hoje, -29)), fim: isoData(hoje) };
    case "semana": { const dow = hoje.getDay() || 7; return { inicio: isoData(addDias(hoje, -(dow - 1))), fim: isoData(hoje) }; }
    case "mes": return { inicio: isoData(new Date(hoje.getFullYear(), hoje.getMonth(), 1)), fim: isoData(hoje) };
    case "custom": return custom;
    default: return { inicio: isoData(hoje), fim: isoData(hoje) };
  }
}
function periodoLabel(preset, intervalo) {
  const opt = PERIODO_PRESETS.find((p) => p[0] === preset);
  if (preset !== "custom") return intervalo.inicio === intervalo.fim ? intervalo.inicio : `${opt[1]} (${intervalo.inicio} a ${intervalo.fim})`;
  return `${intervalo.inicio} a ${intervalo.fim}`;
}
function SeletorPeriodo({ preset, setPreset, custom, setCustom }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 6 }}>
        {PERIODO_PRESETS.map(([k, l]) => (

        ))}
      </div>

          <span style={{ color: T.sub, fontSize: 12 }}>até</span>
          <input type="date" value={custom.fim} onChange={(e) => setCustom({ ...custom, fim: e.target.value })} style={{ ...inputStyle, width: "auto" }} />

  );
}
function agregarWellnessPorAtleta(jogadorId, entries) {
  const doAtleta = entries.filter((e) => e.jogadorId === jogadorId);
  if (!doAtleta.length) return null;
  const media = (fn) => Math.round((doAtleta.reduce((s, e) => s + fn(e), 0) / doAtleta.length) * 10) / 10;
  return {
    registos: doAtleta.length,
    sono: media((e) => e.sono || 0), fadiga: media((e) => e.fadiga || 0), dorMuscular: media((e) => e.dorMuscular || 0), stress: media((e) => e.stress || 0),
    total: media((e) => calcWellnessTotal(e)), notaGeral: media((e) => e.notaGeral || 0),
    observacoes: doAtleta.filter((e) => e.observacoes).length,
  };
}
function agregarPSEPorAtleta(jogadorId, entries) {
  const doAtleta = entries.filter((e) => e.jogadorId === jogadorId);
  if (!doAtleta.length) return null;
  const duracaoTotal = doAtleta.reduce((s, e) => s + (Number(e.duracao) || 0), 0);
  const cargaTotal = doAtleta.reduce((s, e) => s + calcCarga(e.duracao, e.pse), 0);
  const pseMedia = Math.round((doAtleta.reduce((s, e) => s + (e.pse || 0), 0) / doAtleta.length) * 10) / 10;
  return { registos: doAtleta.length, duracaoTotal, pseMedia, cargaTotal, observacoes: doAtleta.filter((e) => e.observacoes).length };
}

function HistoricoFisico({ players, wellnessEntries, pseEntries, accent }) {
  const [jogadorId, setJogadorId] = useState(players[0]?.id || null);
  const jogador = players.find((p) => p.id === jogadorId);
  const [preset, setPreset] = useState("30dias");
  const [custom, setCustom] = useState({ inicio: hojeISO(), fim: hojeISO() });
  const intervalo = calcularIntervalo(preset, custom);
  const historico = useMemo(() => {
    const dentro = (d) => d >= intervalo.inicio && d <= intervalo.fim;
    const datas = new Set([
      ...wellnessEntries.filter((e) => e.jogadorId === jogadorId && dentro(e.data)).map((e) => e.data),
      ...pseEntries.filter((e) => e.jogadorId === jogadorId && dentro(e.data)).map((e) => e.data),
    ]);
    return Array.from(datas).sort((a, b) => b.localeCompare(a)).map((data) => ({
      data, w: wellnessEntries.find((e) => e.jogadorId === jogadorId && e.data === data), p: pseEntries.find((e) => e.jogadorId === jogadorId && e.data === data),
    }));
  }, [jogadorId, wellnessEntries, pseEntries, intervalo.inicio, intervalo.fim]);

  return (
    <>
      <SeletorPeriodo preset={preset} setPreset={setPreset} custom={custom} setCustom={setCustom} />
      <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 8, marginBottom: 16 }}>
        {players.map((p) => (
          <div key={p.id} onClick={() => setJogadorId(p.id)} style={{ flexShrink: 0, textAlign: "center", cursor: "pointer" }}>
            <div style={{ borderRadius: "50%", border: jogadorId === p.id ? `2px solid ${T.warning}` : "2px solid transparent" }}><Avatar label={initials(p.nome)} photo={p.foto} size={44} bg={accent} /></div>
            <div style={{ fontSize: 9, color: T.sub, marginTop: 3, maxWidth: 50, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome?.split(" ")[0]}</div>
          </div>
        ))}
      </div>
      {historico.length === 0 && <div style={{ textAlign: "center", color: T.sub, padding: 30, fontSize: 14 }}>Ainda sem registos para {jogador?.nome}.</div>}
      {historico.map(({ data, w, p }) => (
        <div key={data} style={{ background: T.card, border: `1px solid ${T.sep}`, borderRadius: 12, padding: "10px 14px", marginBottom: 8, fontSize: 12 }}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>{data}</div>
          <div style={{ display: "flex", gap: 16, flexWrap: "wrap", color: T.sub }}>
            {w && <span>Wellness: <b style={{ color: T.text }}>{calcWellnessTotal(w)}/28</b></span>}
            {w?.notaGeral != null && <span>Nota: <b style={{ color: T.text }}>{w.notaGeral}/10</b></span>}
            {p && <span>PSE: <b style={{ color: T.text }}>{p.pse}</b> · Carga: <b style={{ color: T.text }}>{calcCarga(p.duracao, p.pse)} UA</b></span>}
          </div>
          {(w?.observacoes || p?.observacoes) && <div style={{ marginTop: 6, fontSize: 11, color: T.sub }}>📝 {w?.observacoes || p?.observacoes}</div>}
        </div>
      ))}
    </>
  );
}

function CalendarioTab({ games, treinos, accent }) {
  const [monthOffset, setMonthOffset] = useState(0);
  const [selectedDay, setSelectedDay] = useState(null);
  const today = new Date();
  const refDate = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
  const year = refDate.getFullYear(), month = refDate.getMonth();
  const firstWeekday = (new Date(year, month, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const pad = (n) => n.toString().padStart(2, "0");
  const dayKey = (d) => `${year}-${pad(month + 1)}-${pad(d)}`;
  const eventsByDay = useMemo(() => {
    const map = {};
    games.forEach((g) => { if (g.data) (map[g.data] = map[g.data] || []).push({ tipo: "jogo", ref: g }); });
    treinos.forEach((t) => { if (t.data) (map[t.data] = map[t.data] || []).push({ tipo: "treino", ref: t }); });
    return map;
  }, [games, treinos]);
  const cells = []; for (let i = 0; i < firstWeekday; i++) cells.push(null); for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  return (
    <>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
        <button onClick={() => setMonthOffset((m) => m - 1)} style={{ background: T.card, border: `1px solid ${T.sep}`, color: T.text, borderRadius: 10, padding: "6px 12px", cursor: "pointer", fontFamily: FONT }}>‹</button>
        <div style={{ fontWeight: 700, fontSize: 15 }}>{MESES[month]} {year}</div>
        <button onClick={() => setMonthOffset((m) => m + 1)} style={{ background: T.card, border: `1px solid ${T.sep}`, color: T.text, borderRadius: 10, padding: "6px 12px", cursor: "pointer", fontFamily: FONT }}>›</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4, marginBottom: 6 }}>{["S", "T", "Q", "Q", "S", "S", "D"].map((d, i) => <div key={i} style={{ textAlign: "center", fontSize: 11, color: T.sub, fontWeight: 700 }}>{d}</div>)}</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4, marginBottom: 20 }}>
        {cells.map((d, i) => {
          const key = d ? dayKey(d) : null; const evs = key ? eventsByDay[key] || [] : [];
          return (
            <div key={i} onClick={() => d && setSelectedDay(key)} style={{ aspectRatio: "1", borderRadius: 10, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: selectedDay === key ? T.card2 : d ? T.card : "transparent", border: d ? `1px solid ${T.sep}` : "none", cursor: d ? "pointer" : "default" }}>
              {d && <div style={{ fontSize: 12, fontWeight: 600 }}>{d}</div>}
              <div style={{ display: "flex", gap: 2, marginTop: 2 }}>{evs.some((e) => e.tipo === "jogo") && <div style={{ width: 5, height: 5, borderRadius: 3, background: accent }} />}{evs.some((e) => e.tipo === "treino") && <div style={{ width: 5, height: 5, borderRadius: 3, background: T.success }} />}</div>
            </div>
          );
        })}
      </div>
      <div style={{ fontSize: 12, fontWeight: 700, color: T.sub, marginBottom: 8 }}>{selectedDay ? `EVENTOS · ${selectedDay}` : "Toca num dia para ver os eventos"}</div>
      {(selectedDay ? eventsByDay[selectedDay] || [] : []).map((e, i) => <div key={i} style={{ background: T.card, border: `1px solid ${T.sep}`, borderRadius: 12, padding: 12, marginBottom: 8, fontSize: 13 }}>{e.tipo === "jogo" ? `⚽ Jogo · ${e.ref.competicao || "Competição"}` : `🏃 Treino · ${e.ref.objetivo || "Sessão"}`}</div>)}
    </>
  );
}

function RelatoriosTab({ club, players, opponents, games, setGames, reportGameId, setReportGameId }) {
  const finished = games.filter(isTerminado);
  const [pastaAtiva, setPastaAtiva] = useState(null);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const selected = finished.find((g) => g.id === reportGameId);

  const pastas = useMemo(() => {
    const map = {};
    finished.forEach((g) => { const nome = g.competicao || "Sem competição"; (map[nome] = map[nome] || []).push(g); });
    return Object.entries(map).map(([nome, jogos]) => ({ nome, jogos: jogos.sort((a, b) => (b.data || "").localeCompare(a.data || "")) })).sort((a, b) => a.nome.localeCompare(b.nome));
  }, [finished]);

  useEffect(() => {
    if (reportGameId) {
      const g = finished.find((x) => x.id === reportGameId);
      if (g) setPastaAtiva(g.competicao || "Sem competição");
    }
  }, [reportGameId]);

  const updateGame = (updated) => setGames(games.map((g) => (g.id === updated.id ? updated : g)));
  const deleteGame = (id) => {
    const remaining = games.filter((g) => g.id !== id);
    setGames(remaining);
    if (reportGameId === id) setReportGameId(null);
    setConfirmDeleteId(null);
  };

  if (finished.length === 0) return <div style={{ textAlign: "center", color: T.sub, padding: 30, fontSize: 14 }}>Ainda sem jogos terminados. Termina um jogo no separador Jogos para gerar o relatório.</div>;

  // Nível 3: relatório de um jogo específico
  if (selected) {
    return (
      <>
        <GhostBtn onClick={() => setReportGameId(null)}>‹ {pastaAtiva}</GhostBtn>
        <div style={{ marginTop: 10 }}>
          <RelatorioDetalhe club={club} players={players} opponents={opponents} game={selected} onUpdateGame={updateGame} />
        </div>
      </>
    );
  }

  // Nível 2: lista de jogos dentro da pasta ativa
  if (pastaAtiva) {
    const pasta = pastas.find((p) => p.nome === pastaAtiva);
    return (
      <>
        <GhostBtn onClick={() => setPastaAtiva(null)}>‹ Pastas</GhostBtn>
        <div style={{ fontSize: 18, fontWeight: 800, margin: "10px 0 16px" }}>📁 {pastaAtiva}</div>
        {(pasta?.jogos || []).map((g) => {
          const adv = opponents.find((o) => o.id === g.adversarioId);
          return (
            <div key={g.id} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <div onClick={() => setReportGameId(g.id)} style={{ flex: 1, display: "flex", alignItems: "center", gap: 14, background: T.card, border: `1px solid ${T.sep}`, borderRadius: 16, padding: 14, cursor: "pointer" }}>
                <Avatar label={g.mandante === "fora" ? (adv?.simbolo || "ADV") : club.simbolo} bg={g.mandante === "fora" ? adv?.corPrimaria : club.corPrimaria} size={34} photo={g.mandante === "fora" ? adv?.foto : club.foto} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 700 }}>{g.mandante === "fora" ? `${adv?.nome || "?"} vs ${club.nome}` : `${club.nome} vs ${adv?.nome || "?"}`}</div>
                  <div style={{ fontSize: 12, color: T.sub }}>{g.data || "sem data"}</div>
                </div>
                <div style={{ fontSize: 15, fontWeight: 800 }}>{g.mandante === "fora" ? `${g.score.fora} : ${g.score.casa}` : `${g.score.casa} : ${g.score.fora}`}</div>
              </div>
              <button onClick={() => setConfirmDeleteId(g.id)} title="Eliminar relatório" style={{ background: T.card, border: `1px solid ${T.sep}`, color: T.danger, borderRadius: 12, width: 44, height: 44, flexShrink: 0, fontSize: 14, cursor: "pointer" }}>🗑</button>
            </div>
          );
        })}
        {confirmDeleteId && (
          <div onClick={() => setConfirmDeleteId(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60 }}>
            <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 16, padding: 20, width: 300, maxWidth: "90vw", fontFamily: FONT }}>
              <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 8 }}>Eliminar relatório?</div>
              <div style={{ fontSize: 13, color: T.sub, marginBottom: 16 }}>Esta ação remove o jogo e todas as estatísticas associadas. Não pode ser desfeita.</div>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => setConfirmDeleteId(null)} style={{ flex: 1, background: T.card2, border: "none", borderRadius: 10, padding: "10px 0", color: T.text, fontFamily: FONT, cursor: "pointer" }}>Cancelar</button>
                <button onClick={() => deleteGame(confirmDeleteId)} style={{ flex: 1, background: T.danger, border: "none", borderRadius: 10, padding: "10px 0", color: "#000", fontWeight: 700, fontFamily: FONT, cursor: "pointer" }}>Eliminar</button>
              </div>
            </div>
          </div>
        )}
      </>
    );
  }

  // Nível 1: pastas por competição
  return (
    <>
      <div style={{ fontSize: 13, fontWeight: 700, color: T.sub, marginBottom: 14 }}>PASTAS · {pastas.length}</div>
      {pastas.map((p) => (
        <div key={p.nome} onClick={() => setPastaAtiva(p.nome)} style={{ display: "flex", alignItems: "center", gap: 14, background: T.card, border: `1px solid ${T.sep}`, borderRadius: 16, padding: 16, marginBottom: 10, cursor: "pointer" }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: T.card2, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>📁</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 15, fontWeight: 700 }}>{p.nome}</div>
            <div style={{ fontSize: 12, color: T.sub }}>{p.jogos.length} relatório{p.jogos.length !== 1 ? "s" : ""}</div>
          </div>
          <span style={{ color: T.sub, fontSize: 18 }}>›</span>
        </div>
      ))}
    </>
  );
}

/* ============================== APP SHELL ============================== */
function App({ onLogout, accountEmail, adminSlot } = {}) {
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("equipa");
  const [club, setClubState] = useState(CLUB_DEFAULT);
  const [players, setPlayersState] = useState([]);
  const [opponents, setOpponentsState] = useState([]);
  const [games, setGamesState] = useState([]);
  const [treinos, setTreinosState] = useState([]);
  const [competicoes, setCompeticoesState] = useState([]);
  const [analises, setAnalisesState] = useState([]);
  const [planos, setPlanosState] = useState([]);
  const [wellnessEntries, setWellnessEntriesState] = useState([]);
  const [pseEntries, setPseEntriesState] = useState([]);
  const [user, setUserState] = useState(USER_DEFAULT);
  const [reportGameId, setReportGameId] = useState(null);

  useEffect(() => {
    (async () => {
      const c = await safeGet("meuClube"); if (c) setClubState(c);
      const p = await safeGet("meuPlantel"); if (p) setPlayersState(p);
      const o = await safeGet("adversarios"); if (o) setOpponentsState(o);
      const g = await safeGet("jogos"); if (g) setGamesState(g);
      const t = await safeGet("treinos"); if (t) setTreinosState(t);
      const comp = await safeGet("competicoes"); if (comp) setCompeticoesState(comp);
      const an = await safeGet("analises"); if (an) setAnalisesState(an);
      const pl = await safeGet("planos"); if (pl) setPlanosState(pl);
      const we = await safeGet("wellnessEntries"); if (we) setWellnessEntriesState(we);
      const pe = await safeGet("pseEntries"); if (pe) setPseEntriesState(pe);
      const u = await safeGet("perfilUtilizador"); if (u) setUserState(u);
      setLoading(false);
    })();
  }, []);

  const setClub = (v) => { setClubState(v); safeSet("meuClube", v); };
  const setPlayers = (v) => { setPlayersState(v); safeSet("meuPlantel", v); };
  const setOpponents = (v) => { setOpponentsState(v); safeSet("adversarios", v); };
  const setGames = (v) => { setGamesState(v); safeSet("jogos", v); };
  const setTreinos = (v) => { setTreinosState(v); safeSet("treinos", v); };
  const setCompeticoes = (v) => { setCompeticoesState(v); safeSet("competicoes", v); };
  const setAnalises = (v) => { setAnalisesState(v); safeSet("analises", v); };
  const setPlanos = (v) => { setPlanosState(v); safeSet("planos", v); };
  const setWellnessEntries = (v) => { setWellnessEntriesState(v); safeSet("wellnessEntries", v); };
  const setPseEntries = (v) => { setPseEntriesState(v); safeSet("pseEntries", v); };
  const setUser = (v) => { setUserState(v); safeSet("perfilUtilizador", v); };

  const accent = accessibleAccent(club.corPrimaria);
  const goToReport = (id) => { setReportGameId(id); setTab("relatorios"); };

  if (loading) return (
    <div style={{ fontFamily: FONT, background: T.bg, color: T.sub, minHeight: 400, display: "flex", flexDirection: "column", gap: 16, alignItems: "center", justifyContent: "center", borderRadius: 24, fontSize: 13 }}>
      <AppLogo size={26} />
      A carregar…
    </div>
  );

  const TABS = [["equipa", "Equipa"], ["jogos", "Jogos"], ["individual", "Análise Individual"], ["bolasparadas", "Bolas Paradas"], ["fisica", "Condição Física"], ["estatisticas", "Estatísticas"], ["relatorios", "Relatórios"], ["definicoes", "Definições"]];

  return (
    <div style={{ fontFamily: FONT, background: T.bg, color: T.text, padding: 20, borderRadius: 24, width: "100%", maxWidth: "min(1500px, 98vw)", boxSizing: "border-box", margin: "0 auto", minHeight: 700, boxShadow: "0 30px 80px rgba(0,0,0,0.5)", border: "1px solid rgba(255,255,255,0.06)" }}>
      <style>{GLOBAL_CSS}</style>
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 20 }}>
        <AppLogo />
      </div>
      <PillTabs tabs={TABS} active={tab} onChange={setTab} />

      <ErrorBoundary key={tab}>
        {tab === "equipa" && <EquipaTab club={club} setClub={setClub} players={players} setPlayers={setPlayers} opponents={opponents} setOpponents={setOpponents} games={games} accent={accent} />}
        {tab === "jogos" && <JogosTab club={club} players={players} opponents={opponents} games={games} setGames={setGames} competicoes={competicoes} setCompeticoes={setCompeticoes} accent={accent} goToReport={goToReport} />}
        {tab === "individual" && <AnaliseIndividualTab club={club} players={players} opponents={opponents} analises={analises} setAnalises={setAnalises} accent={accent} />}
        {tab === "bolasparadas" && <BolasParadasTab club={club} players={players} planos={planos} setPlanos={setPlanos} />}
        {tab === "fisica" && <FisicaTab club={club} players={players} wellnessEntries={wellnessEntries} setWellnessEntries={setWellnessEntries} pseEntries={pseEntries} setPseEntries={setPseEntries} accent={accent} accountEmail={accountEmail} />}
        {tab === "estatisticas" && <EstatisticasTab players={players} opponents={opponents} games={games} accent={accent} />}
        {tab === "relatorios" && <RelatoriosTab club={club} players={players} opponents={opponents} games={games} setGames={setGames} reportGameId={reportGameId} setReportGameId={setReportGameId} />}
        {tab === "definicoes" && <DefinicoesTab club={club} user={user} setUser={setUser} accent={accent} onLogout={onLogout} accountEmail={accountEmail} adminSlot={adminSlot} />}
      </ErrorBoundary>

      <AppFooter />
    </div>
  );
}

        Para teres contas reais com sincronização entre dispositivos (iPad, iPhone, Mac), liga este ficheiro a um projeto Firebase gratuito — leva cerca de 5 minutos:
        <br /><br />
        1. Cria um projeto em <b style={{ color: T.text }}>console.firebase.google.com</b><br />
        2. Ativa <b style={{ color: T.text }}>Authentication → Email/Password</b><br />
        3. Cria uma <b style={{ color: T.text }}>Firestore Database</b><br />
        4. Copia a configuração da tua app Web e cola-a na constante <b style={{ color: T.text }}>firebaseConfig</b>, no topo deste ficheiro
      </div>
    </div>
  );
}

function AuthScreen({ onAuthed }) {
  const [mode, setMode] = useState("login");
  const [nome, setNome] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [confirmar, setConfirmar] = useState("");
  const [erro, setErro] = useState("");
  const [loading, setLoading] = useState(false);

  const submeter = async () => {
    setErro("");
    if (!email || !password) { setErro("Preenche o email e a palavra-passe."); return; }
    if (mode === "signup" && password !== confirmar) { setErro("As palavras-passe não coincidem."); return; }
    setLoading(true);
    try {
      if (mode === "signup") {
        const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
        if (nome) await cred.user.updateProfile({ displayName: nome });
        CURRENT_UID = cred.user.uid;
        await safeSet("perfilUtilizador", { nome: nome || email.split("@")[0], email, criadoEm: new Date().toISOString().slice(0, 10), ultimoAcesso: new Date().toISOString().slice(0, 10), foto: null });
        // Pedido de acesso — fica pendente até seres aprovado pelo administrador
        if (email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
          try {
            await firebase.firestore().collection("acessos").doc(cred.user.uid).set({
              email, nome: nome || email.split("@")[0], estado: "pendente", criadoEm: new Date().toISOString(),
            });
          } catch (e) { console.error("Erro ao criar pedido de acesso", e); }
        }
      } else {
        const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
        CURRENT_UID = cred.user.uid;
      }
      onAuthed();
    } catch (e) {
      setErro(authErrorMessage(e.code));
    }
    setLoading(false);
  };

  return (
    <div style={{ fontFamily: FONT, background: T.bg, color: T.text, minHeight: 500, borderRadius: 24, padding: 32, maxWidth: 380, margin: "40px auto", boxSizing: "border-box" }}>
      <style>{GLOBAL_CSS}</style>
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 28 }}><AppLogo size={26} /></div>
      <div style={{ fontSize: 20, fontWeight: 800, textAlign: "center", marginBottom: 4 }}>{mode === "login" ? "Iniciar Sessão" : "Criar Conta"}</div>
      <div style={{ fontSize: 13, color: T.sub, textAlign: "center", marginBottom: 24 }}>{mode === "login" ? "Acede aos teus dados em qualquer dispositivo" : "Uma conta nova fica sujeita a aprovação"}</div>

      {mode === "signup" && <div style={{ marginBottom: 12 }}><input style={inputStyle} placeholder="Nome" value={nome} onChange={(e) => setNome(e.target.value)} /></div>}
      <div style={{ marginBottom: 12 }}><input style={inputStyle} type="email" placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)} /></div>
      <div style={{ marginBottom: 12 }}><input style={inputStyle} type="password" placeholder="Palavra-passe" value={password} onChange={(e) => setPassword(e.target.value)} /></div>
      {mode === "signup" && <div style={{ marginBottom: 12 }}><input style={inputStyle} type="password" placeholder="Confirmar palavra-passe" value={confirmar} onChange={(e) => setConfirmar(e.target.value)} /></div>}

      {erro && <div style={{ color: T.danger, fontSize: 12, marginBottom: 12, textAlign: "center" }}>{erro}</div>}

      <div style={{ marginBottom: 16 }}>
        <PrimaryBtn disabled={loading} onClick={submeter}>{loading ? "Aguarda…" : mode === "login" ? "Entrar" : "Criar Conta"}</PrimaryBtn>
      </div>
      <div style={{ textAlign: "center" }}>
        <GhostBtn onClick={() => { setMode(mode === "login" ? "signup" : "login"); setErro(""); }}>
          {mode === "login" ? "Não tens conta? Criar conta" : "Já tens conta? Iniciar sessão"}
        </GhostBtn>
      </div>
    </div>
  );
}

function StorageErrorBanner() {
  const [err, setErr] = useState(null);
  useEffect(() => {
    const handler = (e) => setErr(e.detail);
    window.addEventListener("apexstats-storage-error", handler);
    return () => window.removeEventListener("apexstats-storage-error", handler);
  }, []);
  if (!err) return null;
  const permissao = err.code === "permission-denied";
  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 200, background: "#3a1010", borderBottom: "1px solid #ff453a", padding: "10px 16px", fontFamily: FONT, fontSize: 12, color: "#fff", textAlign: "center" }}>
      ⚠️ Falha ao {err.action} dados ({err.key}).{" "}
      {permissao ? "As regras do Firestore estão a bloquear o acesso — confirma as regras de segurança." : err.message}
      <button onClick={() => setErr(null)} style={{ marginLeft: 10, background: "none", border: "none", color: "#fff", textDecoration: "underline", cursor: "pointer", fontFamily: FONT, fontSize: 12 }}>fechar</button>
    </div>
  );
}

/* Exporta o #report-paper para PDF, capturando cada secção (.pdf-block) separadamente e
   quebrando de página apenas entre secções — nunca a meio de uma tabela ou cartão. */
window.exportarRelatorioPDFBlocos = async function (nomeFicheiro) {
  const container = document.getElementById("report-paper");
  if (!container || !window.html2canvas || !window.jspdf) { window.print(); return; }
  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "a4" });
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const margin = 26;
    const usableWidth = pageWidth - margin * 2;
    let blocks = Array.from(container.querySelectorAll(".pdf-block"));
    if (blocks.length === 0) blocks = [container];
    let y = margin;
    let pagina = 0;
    const novaPagina = () => { if (pagina > 0) pdf.addPage(); pdf.setFillColor(255, 255, 255); pdf.rect(0, 0, pageWidth, pageHeight, "F"); pagina++; y = margin; };
    novaPagina();
    for (const block of blocks) {
      const canvas = await window.html2canvas(block, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
      const imgData = canvas.toDataURL("image/jpeg", 0.95);
      const blockHeight = (canvas.height * usableWidth) / canvas.width;
      if (y > margin && y + blockHeight > pageHeight - margin) novaPagina();
      pdf.addImage(imgData, "JPEG", margin, y, usableWidth, blockHeight);
      y += blockHeight + 14;
    }
    pdf.save(nomeFicheiro);
  } catch (e) {
    console.error("Erro ao gerar PDF", e);
    window.print();
  }
};

function EcraEstado({ icone, titulo, texto, onLogout, onVerificar }) {
  return (
    <div style={{ fontFamily: FONT, background: T.bg, color: T.text, minHeight: 400, borderRadius: 24, padding: 32, maxWidth: 420, margin: "40px auto", textAlign: "center", boxSizing: "border-box" }}>
      <style>{GLOBAL_CSS}</style>
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 24 }}><AppLogo /></div>
      <div style={{ fontSize: 34, marginBottom: 12 }}>{icone}</div>
      <div style={{ fontSize: 17, fontWeight: 700, marginBottom: 10 }}>{titulo}</div>
      <div style={{ fontSize: 13, color: T.sub, lineHeight: 1.6, marginBottom: 24 }}>{texto}</div>
      {onVerificar && <div style={{ marginBottom: 12 }}><PrimaryBtn onClick={onVerificar}>Verificar novamente</PrimaryBtn></div>}
      <GhostBtn onClick={onLogout}>Terminar sessão</GhostBtn>
    </div>
  );
}

function PainelAprovacoes() {
  const [pedidos, setPedidos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [erro, setErro] = useState("");

  const carregar = async () => {
    setLoading(true);
    setErro("");
    try {
      const snap = await firebase.firestore().collection("acessos").get();
      const lista = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
      lista.sort((a, b) => (a.estado === "pendente" ? -1 : 1) - (b.estado === "pendente" ? -1 : 1));
      setPedidos(lista);
    } catch (e) { setErro(e.message); }
    setLoading(false);
  };
  useEffect(() => { carregar(); }, []);

  const atualizar = async (uid, estado) => {
    try {
      await firebase.firestore().collection("acessos").doc(uid).update({ estado });
      carregar();
    } catch (e) { alert("Erro ao atualizar: " + e.message); }
  };

  const pendentes = pedidos.filter((p) => p.estado === "pendente");
  const outros = pedidos.filter((p) => p.estado !== "pendente");

  return (
    <div style={{ background: T.card, border: `1px solid ${T.sep}`, borderRadius: 14, padding: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontSize: 12, color: T.sub }}>{pendentes.length} pedido{pendentes.length !== 1 ? "s" : ""} pendente{pendentes.length !== 1 ? "s" : ""}</div>
        <button onClick={carregar} style={{ background: "none", border: "none", color: "#0A84FF", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>Atualizar</button>
      </div>
      {loading && <div style={{ color: T.sub, fontSize: 13, textAlign: "center", padding: 12 }}>A carregar…</div>}
      {erro && <div style={{ color: T.danger, fontSize: 12, marginBottom: 10 }}>{erro}</div>}
      {!loading && pedidos.length === 0 && <div style={{ color: T.sub, fontSize: 13, textAlign: "center", padding: 12 }}>Ainda sem pedidos de acesso.</div>}
      {pendentes.map((p) => (
        <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: `1px solid ${T.sep}` }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700 }}>{p.nome}</div>
            <div style={{ fontSize: 11, color: T.sub }}>{p.email}</div>
          </div>
          <span style={{ fontSize: 10, fontWeight: 700, color: T.warning, background: "rgba(255,214,10,0.15)", padding: "3px 8px", borderRadius: 8 }}>Pendente</span>
          <button onClick={() => atualizar(p.id, "aprovado")} style={{ background: T.success, border: "none", color: "#000", borderRadius: 8, padding: "6px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>Aprovar</button>
          <button onClick={() => atualizar(p.id, "rejeitado")} style={{ background: "transparent", border: `1px solid ${T.danger}`, color: T.danger, borderRadius: 8, padding: "6px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>Rejeitar</button>
        </div>
      ))}
      {outros.map((p) => (
        <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: `1px solid ${T.sep}` }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700 }}>{p.nome}</div>
            <div style={{ fontSize: 11, color: T.sub }}>{p.email}</div>
          </div>
          <span style={{ fontSize: 10, fontWeight: 700, color: p.estado === "aprovado" ? T.success : T.danger, background: p.estado === "aprovado" ? "rgba(48,209,88,0.15)" : "rgba(255,69,58,0.15)", padding: "3px 8px", borderRadius: 8 }}>{p.estado === "aprovado" ? "Aprovado" : "Rejeitado"}</span>
          {p.estado === "aprovado" ? (
            <button onClick={() => atualizar(p.id, "rejeitado")} style={{ background: "transparent", border: `1px solid ${T.danger}`, color: T.danger, borderRadius: 8, padding: "6px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>Revogar</button>
          ) : (
            <button onClick={() => atualizar(p.id, "aprovado")} style={{ background: T.success, border: "none", color: "#000", borderRadius: 8, padding: "6px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>Aprovar</button>
          )}
        </div>
      ))}
    </div>
  );
}

function AuthGate() {
  const [checking, setChecking] = useState(true);
  const [user, setUser] = useState(null);
  const [acessoEstado, setAcessoEstado] = useState(null); // "admin" | "aprovado" | "pendente" | "rejeitado" | null (a verificar)

  useEffect(() => {
    if (!FIREBASE_READY) { setChecking(false); return; }
    const unsub = firebase.auth().onAuthStateChanged((u) => {
      CURRENT_UID = u ? u.uid : null;
      setUser(u);
      setChecking(false);
      if (!u) setAcessoEstado(null);
    });
    return unsub;
  }, []);

  const verificarAcesso = async () => {
    if (!user) return;
    if (user.email && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) { setAcessoEstado("admin"); return; }
    setAcessoEstado(null);
    try {
      const snap = await firebase.firestore().collection("acessos").doc(user.uid).get();
      setAcessoEstado(snap.exists ? (snap.data().estado || "pendente") : "pendente");
    } catch (e) {
      setAcessoEstado("pendente");
    }
  };
  useEffect(() => { if (user) verificarAcesso(); }, [user]);

  if (!FIREBASE_READY) return <SetupNotice />;
  if (checking) return <div style={{ fontFamily: FONT, color: T.sub, background: T.bg, minHeight: 300, display: "flex", flexDirection: "column", gap: 16, alignItems: "center", justifyContent: "center" }}><AppLogo size={26} />A carregar…</div>;

  if (!user) return <AuthScreen onAuthed={() => setUser(firebase.auth().currentUser)} />;

  if (acessoEstado === null) return <div style={{ fontFamily: FONT, color: T.sub, background: T.bg, minHeight: 300, display: "flex", flexDirection: "column", gap: 16, alignItems: "center", justifyContent: "center" }}><AppLogo size={26} />A verificar acesso…</div>;

  if (acessoEstado === "pendente") {
    return <EcraEstado icone="⏳" titulo="Conta a aguardar aprovação" texto="A tua conta foi criada, mas ainda precisa de ser aprovada pelo administrador antes de poderes usar a app. Tenta novamente mais tarde." onLogout={() => firebase.auth().signOut()} onVerificar={verificarAcesso} />;
  }
  if (acessoEstado === "rejeitado") {
    return <EcraEstado icone="🚫" titulo="Acesso não autorizado" texto="O administrador não autorizou esta conta." onLogout={() => firebase.auth().signOut()} />;
  }

  return (
    <>
      <StorageErrorBanner />
      <App onLogout={() => firebase.auth().signOut()} accountEmail={user.email} adminSlot={acessoEstado === "admin" ? <PainelAprovacoes /> : null} />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AuthGate />);

</script>
