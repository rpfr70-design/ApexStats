<script type="text/babel" data-presets="react" data-type="module">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ============================== TOKENS ============================== */
const T = {
  bg: "#000000", card: "#1C1C1E", card2: "#2C2C2E", sep: "#38383A",
  text: "#FFFFFF", sub: "#8E8E93", success: "#30D158", warning: "#FFD60A", danger: "#FF453A",
};
const FONT = '-apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif';
const GLOBAL_CSS = `
@keyframes gcFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes gcScaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
@keyframes gcSlideUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
@keyframes gcTabFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.gc-backdrop { animation: gcFadeIn 0.18s ease-out; backdrop-filter: blur(18px) saturate(1.4); -webkit-backdrop-filter: blur(18px) saturate(1.4); }
.gc-sheet-center { animation: gcScaleIn 0.25s cubic-bezier(.22,1,.36,1); }
.gc-sheet-up { animation: gcSlideUp 0.32s cubic-bezier(.22,1,.36,1); }
.gc-tabcontent { animation: gcTabFade 0.32s cubic-bezier(.22,1,.36,1); }
.gc-btn { transition: transform 0.12s ease, filter 0.12s ease, opacity 0.12s ease; }
.gc-btn:active { transform: scale(0.95); }
.gc-btn:hover { filter: brightness(1.12); }
.gc-pill { transition: background 0.22s cubic-bezier(.22,1,.36,1), color 0.22s ease, box-shadow 0.22s ease, transform 0.12s ease; }
.gc-pill:active { transform: scale(0.96); }
.gc-row { transition: background 0.15s ease, transform 0.12s ease; }
.gc-row:hover { background: #232327; }
.gc-row:active { transform: scale(0.995); }
::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.26); }
::-webkit-scrollbar-track { background: transparent; }
* { -webkit-tap-highlight-color: transparent; }

/* Estatísticas ao vivo — 2 colunas em ecrãs largos (iPad/Mac) */
@media (min-width: 640px) {
  .gc-livestats { grid-template-columns: 1fr 1fr !important; }
}

/* Responsividade geral — telemóveis e tablets em retrato/paisagem */

/* Armazenamento com conta real — Firestore, isolado por utilizador (CURRENT_UID).
   Cada valor é dividido automaticamente em vários documentos quando ultrapassa o limite
   de 1MB por documento do Firestore (ex.: plantéis com muitas fotos). */
let CURRENT_UID = null;
const FIRESTORE_CHUNK_CHARS = 700000;
function reportStorageError(action, key, e) {
  console.error(action, key, e);
  try {
    window.dispatchEvent(new CustomEvent("apexstats-storage-error", { detail: { action, key, message: (e && e.message) || String(e), code: e && e.code } }));
  } catch (err) {}
}
function dataColRef() {
  return firebase.firestore().collection("users").doc(CURRENT_UID).collection("data");
}
async function safeGet(key) {
  try {
    if (!CURRENT_UID) return null;
    const col = dataColRef();
    const snap = await col.doc(key).get();
    if (!snap.exists) return null;
    const data = snap.data();
    if (!data.chunked) return data.value !== undefined ? data.value : null;
    const total = data.partes || 0;
    const pedacos = await Promise.all(Array.from({ length: total }, (_, i) => col.doc(`${key}__p${i}`).get()));
    const json = pedacos.map((p) => (p.exists ? p.data().p : "")).join("");
    return json ? JSON.parse(json) : null;
  } catch (e) { reportStorageError("ler", key, e); return null; }
}
async function safeSet(key, value) {
  try {
    if (!CURRENT_UID) return;
    const limpo = JSON.parse(JSON.stringify(value));
    const json = JSON.stringify(limpo);
    const col = dataColRef();
    let antigoPartes = 0;
    try {
      const antigo = await col.doc(key).get();
      if (antigo.exists && antigo.data().chunked) antigoPartes = antigo.data().partes || 0;
    } catch (e) {}
    if (json.length <= FIRESTORE_CHUNK_CHARS) {
      await col.doc(key).set({ value: limpo, chunked: false, atualizadoEm: new Date().toISOString() });
      for (let i = 0; i < antigoPartes; i++) col.doc(`${key}__p${i}`).delete().catch(() => {});
    } else {
      const novasPartes = Math.ceil(json.length / FIRESTORE_CHUNK_CHARS);
      const escritas = [];
      for (let i = 0; i < novasPartes; i++) {
        escritas.push(col.doc(`${key}__p${i}`).set({ p: json.slice(i * FIRESTORE_CHUNK_CHARS, (i + 1) * FIRESTORE_CHUNK_CHARS) }));
      }
      await Promise.all(escritas);
      await col.doc(key).set({ chunked: true, partes: novasPartes, atualizadoEm: new Date().toISOString() });
      for (let i = novasPartes; i < antigoPartes; i++) col.doc(`${key}__p${i}`).delete().catch(() => {});
    }
  } catch (e) { reportStorageError("guardar", key, e); }
}

/* Airbag: se algo rebentar numa vista, mostra um aviso em vez de fechar tudo */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError() { return { hasError: true }; }
  componentDidCatch(error) { if (typeof console !== "undefined") console.error(error); }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ fontFamily: FONT, textAlign: "center", padding: 40, color: T.sub }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: T.text, marginBottom: 8 }}>Ocorreu um problema nesta vista</div>
          <div style={{ fontSize: 13, marginBottom: 16 }}>Os teus dados não foram perdidos.</div>
          <button onClick={() => this.setState({ hasError: false })} style={{ background: T.text, color: "#000", border: "none", borderRadius: 12, padding: "10px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>Tentar novamente</button>
        </div>
      );
    }
    return <div className="gc-tabcontent">{this.props.children}</div>;
  }
}

function resizeImageFile(file, maxDim = 240, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Falha a ler o ficheiro"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Falha a carregar a imagem"));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height * (maxDim / width)); width = maxDim; }
        else if (height >= width && height > maxDim) { width = Math.round(width * (maxDim / height)); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
function PhotoPicker({ photo, onChange, size = 72, fallbackLabel, fallbackBg }) {
  const inputRef = useRef(null);
  const [busy, setBusy] = useState(false);
  const handleFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setBusy(true);
    try {
      const dataUrl = await resizeImageFile(file);
      onChange(dataUrl);
    } catch (err) { /* ignora ficheiro inválido */ }
    setBusy(false);
  };
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <Avatar photo={photo} label={fallbackLabel} bg={fallbackBg} size={size} />
      {busy && <div style={{ position: "absolute", inset: 0, borderRadius: size / 2, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#fff" }}>...</div>}
      <div onClick={() => inputRef.current && inputRef.current.click()} style={{ position: "absolute", bottom: -2, right: -2, width: Math.max(20, size * 0.34), height: Math.max(20, size * 0.34), borderRadius: "50%", background: T.text, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", border: `2px solid ${T.card}`, fontSize: 11 }}>✎</div>
      {photo && <div onClick={() => onChange(null)} style={{ position: "absolute", top: -2, right: -2, width: 18, height: 18, borderRadius: 9, background: T.danger, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 10, color: "#000", fontWeight: 800 }}>✕</div>}
      <input ref={inputRef} type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
    </div>
  );
}

function SquadList({ players, accent, onEdit }) {
  const labels = { GR: "Guarda-Redes", DD: "Defesas", DC: "Defesas", DE: "Defesas", MDC: "Médios", MC: "Médios", MO: "Médios", EE: "Extremos", ED: "Extremos", PL: "Extremos", AV: "Avançados" };
  const cats = [];
  POSICOES.forEach((pos) => {
    const items = players.filter((p) => p.posicao === pos);
    if (!items.length) return;
    const cat = labels[pos] || pos;
    let existing = cats.find((c) => c.cat === cat);
    if (!existing) { existing = { cat, items: [] }; cats.push(existing); }
    existing.items.push(...items);
  });
  if (!players.length) return <div style={{ textAlign: "center", color: T.sub, padding: "30px 0", fontSize: 14 }}>Ainda sem jogadores. Toca em "+" para adicionar.</div>;
  return cats.map((c) => (
    <div key={c.cat} style={{ marginBottom: 18 }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: T.sub, marginBottom: 8, marginLeft: 4 }}>{c.cat}</div>
      <div style={{ background: T.card, borderRadius: 14, border: `1px solid ${T.sep}`, overflow: "hidden" }}>
        {c.items.map((p) => (
          <div key={p.id} onClick={() => onEdit(p)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderBottom: `1px solid ${T.sep}`, cursor: "pointer" }}>

            <span style={{ fontSize: 11, fontWeight: 700, background: T.card2, padding: "3px 8px", borderRadius: 6, color: T.sub, marginRight: 4 }}>{p.posicao}</span>
            <div style={{ fontSize: 16, fontWeight: 700, color: accent, width: 28, textAlign: "right" }}>{p.numero || "-"}</div>
          </div>
        ))}
      </div>
    </div>
  ));
}

function PlayerStatsModal({ player, equipa, adversarioId, games, opponents, onClose }) {
  const [mapaTipo, setMapaTipo] = useState(null);
  const [selectedDot, setSelectedDot] = useState(null);
  const [competicaoFiltro, setCompeticaoFiltro] = useState(null); // null = Total

  const relevantGamesTotal = useMemo(() => games.filter((g) => isTerminado(g) && (equipa === "casa" || g.adversarioId === adversarioId)), [games, equipa, adversarioId]);

  const competicoesDisponiveis = useMemo(() => {
    const set = new Set();
    relevantGamesTotal.forEach((g) => set.add(g.competicao || "Sem competição"));
    return Array.from(set).sort((a, b) => a.localeCompare(b));
  }, [relevantGamesTotal]);

  const relevantGames = useMemo(() => {
    if (!competicaoFiltro) return relevantGamesTotal;
    return relevantGamesTotal.filter((g) => (g.competicao || "Sem competição") === competicaoFiltro);
  }, [relevantGamesTotal, competicaoFiltro]);

  const stats = useMemo(() => {
    const counts = {};
    ACOES.forEach((a) => { if (a.tipo !== "Substituição") counts[a.tipo] = 0; });
    let jogos = 0, titularidades = 0, entradas = 0, saidas = 0, minutos = 0;
    relevantGames.forEach((g) => {
      const actions = g.actions || [];
      const matchMin = Math.max(1, Math.round((g.duracaoSegundos || 0) / 60));
      const jogouEsteJogo = actions.some((a) => a.equipa === equipa && (a.jogador === player.id || a.saiuId === player.id));
      if (equipa === "casa") { if ((g.convocados || []).includes(player.id)) jogos++; }
      else if (jogouEsteJogo) jogos++;

      actions.forEach((a) => {
        if (a.tipo === "Substituição") {
          if (a.equipa === equipa && a.jogador === player.id) entradas++;
          if (a.equipa === equipa && a.saiuId === player.id) saidas++;
        } else if (a.equipa === equipa && a.jogador === player.id) {
          counts[a.tipo] = (counts[a.tipo] || 0) + 1;
        }
      });

      if (equipa === "casa") {
        const titularIds = Object.values(g.titulares || {});
        const subs = actions.filter((a) => a.tipo === "Substituição" && a.equipa === "casa").sort((a, b) => a.minuto - b.minuto);
        if (titularIds.includes(player.id)) {
          titularidades++;
          const saiu = subs.find((s) => s.saiuId === player.id);
          minutos += saiu ? saiu.minuto : matchMin;
        } else {
          const entrada = subs.find((s) => s.jogador === player.id);
          if (entrada) minutos += Math.max(0, matchMin - entrada.minuto);
        }
      }
    });
    return { counts, jogos, titularidades, entradas, saidas, minutos };
  }, [relevantGames, player.id, equipa]);

  const actionsByTipo = useMemo(() => {
    const map = {};
    relevantGames.forEach((g) => {
      const adv = opponents.find((o) => o.id === g.adversarioId);
      (g.actions || []).forEach((a) => {
        if (a.tipo === "Substituição" || a.equipa !== equipa || a.jogador !== player.id) return;
        (map[a.tipo] = map[a.tipo] || []).push({ ...a, adversarioNome: adv?.nome, data: g.data });
      });
    });
    return map;
  }, [relevantGames, player.id, equipa, opponents]);

  const totalAcoes = Object.values(stats.counts).reduce((a, b) => a + b, 0);
  const resumoChips = [["Jogos", stats.jogos]];
  if (equipa === "casa") resumoChips.push(["Titular", stats.titularidades], ["Minutos", `${stats.minutos}'`]);
  resumoChips.push(["Entradas", stats.entradas], ["Saídas", stats.saidas]);
  const pontosMapa = mapaTipo ? (actionsByTipo[mapaTipo] || []) : [];

  return (
    <div onClick={onClose} className="gc-backdrop" style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 70 }}>
      <div onClick={(e) => e.stopPropagation()} className="gc-sheet-center" style={{ background: "rgba(28,28,30,0.96)", borderRadius: 20, border: "1px solid rgba(255,255,255,0.08)", width: 460, maxWidth: "92vw", maxHeight: "88vh", overflowY: "auto", padding: 20, fontFamily: FONT, boxShadow: "0 28px 70px rgba(0,0,0,0.55)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
          <Avatar label={initials(player.nome)} photo={player.foto} size={48} />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 16, fontWeight: 700 }}>{player.nome || "Sem nome"}</div>
            <div style={{ fontSize: 12, color: T.sub }}>#{player.numero || "-"} · {player.posicao}</div>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#0A84FF", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>Fechar</button>
        </div>

        {!mapaTipo && competicoesDisponiveis.length > 1 && (
          <div style={{ display: "flex", gap: 6, overflowX: "auto", marginBottom: 14, paddingBottom: 2 }}>
            <button onClick={() => setCompeticaoFiltro(null)} style={{ whiteSpace: "nowrap", background: !competicaoFiltro ? T.text : T.card, color: !competicaoFiltro ? "#000" : T.text, border: `1px solid ${T.sep}`, borderRadius: 10, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>Total</button>
            {competicoesDisponiveis.map((c) => (
              <button key={c} onClick={() => setCompeticaoFiltro(c)} style={{ whiteSpace: "nowrap", background: competicaoFiltro === c ? T.text : T.card, color: competicaoFiltro === c ? "#000" : T.text, border: `1px solid ${T.sep}`, borderRadius: 10, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>📁 {c}</button>
            ))}
          </div>
        )}

        {!mapaTipo && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 20 }}>
            {resumoChips.map(([label, val]) => (
              <div key={label} style={{ background: T.card2, borderRadius: 12, padding: "10px 4px", textAlign: "center" }}>
                <div style={{ fontSize: 16, fontWeight: 800 }}>{val}</div>
                <div style={{ fontSize: 9, color: T.sub, textTransform: "uppercase", fontWeight: 700 }}>{label}</div>
              </div>
            ))}
          </div>
        )}

        {!mapaTipo ? (
          <>
            <div style={{ fontSize: 12, fontWeight: 700, color: T.sub, marginBottom: 10 }}>AÇÕES POR CATEGORIA ({totalAcoes}) · toca para ver no campo</div>
            {relevantGames.length === 0 && <div style={{ color: T.sub, fontSize: 13, textAlign: "center", padding: 20 }}>Ainda sem jogos terminados registados{equipa === "fora" ? " contra este adversário" : ""}.</div>}
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              {ACOES.filter((a) => a.tipo !== "Substituição").map((a) => {
                const temAcoes = stats.counts[a.tipo] > 0;
                return (
                  <div key={a.tipo} onClick={() => temAcoes && setMapaTipo(a.tipo)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "9px 12px", background: T.card, borderRadius: 10, border: `1px solid ${T.sep}`, cursor: temAcoes ? "pointer" : "default" }}>
                    <span style={{ fontSize: 13 }}>{a.emoji} {a.tipo}</span>
                    <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ fontSize: 14, fontWeight: 800, color: temAcoes ? "#D8B26A" : T.sub }}>{stats.counts[a.tipo]}</span>
                      {temAcoes && <span style={{ color: T.sub, fontSize: 13 }}>›</span>}
                    </span>
                  </div>
                );
              })}
            </div>
          </>
        ) : (
          <>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
              <GhostBtn onClick={() => setMapaTipo(null)}>‹ Categorias</GhostBtn>
              <div style={{ fontSize: 13, fontWeight: 700 }}>{emojiFor(mapaTipo)} {mapaTipo} · {pontosMapa.length}</div>
            </div>
            <div style={{ position: "relative", width: "100%", aspectRatio: "100 / 62", background: "#2e7d32", border: `1px solid ${T.sep}`, borderRadius: 12, overflow: "hidden" }}>
              <GrassStripes />
              <PitchLinesHorizontal />
              {pontosMapa.map((a) => (
                <div key={a.id} onClick={() => setSelectedDot(a)} title={`${a.minuto}'`} style={{ position: "absolute", left: `${a.x}%`, top: `${a.y}%`, transform: "translate(-50%,-50%)", width: 22, height: 22, borderRadius: 11, background: "#D8B26A", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, cursor: "pointer", border: "1px solid rgba(0,0,0,0.4)" }}>{emojiFor(mapaTipo)}</div>
              ))}
            </div>
          </>
        )}

        {selectedDot && (
          <div onClick={() => setSelectedDot(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 80 }}>
            <div onClick={(e) => e.stopPropagation()} style={{ background: T.card, borderRadius: 16, padding: 20, width: 260, maxWidth: "90vw" }}>
              <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 10 }}>{emojiFor(mapaTipo)} {mapaTipo}</div>
              {equipa === "casa" && selectedDot.adversarioNome && <div style={{ fontSize: 13, color: T.sub, marginBottom: 4 }}>Adversário: <span style={{ color: T.text }}>{selectedDot.adversarioNome}</span></div>}
              {selectedDot.data && <div style={{ fontSize: 13, color: T.sub, marginBottom: 4 }}>Data: <span style={{ color: T.text }}>{selectedDot.data}</span></div>}
              <div style={{ fontSize: 13, color: T.sub }}>Minuto: <span style={{ color: T.text }}>{selectedDot.minuto}'</span></div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

      {sub === "adversarios" && activeOpponent && currentOpp && (
        <>

            <Avatar label={currentOpp.simbolo} size={52} bg={currentOpp.corPrimaria} photo={currentOpp.foto} />
            <div style={{ flex: 1 }}><div style={{ fontSize: 18, fontWeight: 700 }}>{currentOpp.nome}</div></div>
            <span style={{ color: T.sub, fontSize: 18 }}>›</span>

      {oppModal && oppDraft && (
        <Modal title="Clube Adversário" onClose={() => setOppModal(false)}
          onSave={() => { const exists = opponents.some((o) => o.id === oppDraft.id); const list = exists ? opponents.map((o) => (o.id === oppDraft.id ? { ...oppDraft, players: o.players } : o)) : [...opponents, oppDraft]; setOpponents(list); setOppModal(false); }}
          onDelete={opponents.some((o) => o.id === oppDraft.id) ? () => { setOpponents(opponents.filter((o) => o.id !== oppDraft.id)); setOppModal(false); setActiveOpponent(null); } : null}>
          <ClubForm draft={oppDraft} setDraft={setOppDraft} />
        </Modal>
      )}

      {playerModal && (
        <Modal title={sub === "equipa" ? "Jogador" : "Jogador Adversário"} onClose={() => setPlayerModal(null)}
          onSave={() => {
            if (sub === "equipa") { const exists = players.some((p) => p.id === playerModal.id); setPlayers(exists ? players.map((p) => (p.id === playerModal.id ? playerModal : p)) : [...players, playerModal]); }
            else if (currentOpp) { const exists = currentOpp.players.some((p) => p.id === playerModal.id); const updated = exists ? currentOpp.players.map((p) => (p.id === playerModal.id ? playerModal : p)) : [...currentOpp.players, playerModal]; setOpponents(opponents.map((o) => (o.id === currentOpp.id ? { ...o, players: updated } : o))); }
            setPlayerModal(null);
          }}
          onDelete={(sub === "equipa" ? players : currentOpp ? currentOpp.players : []).some((p) => p.id === playerModal.id) ? () => {
            if (sub === "equipa") setPlayers(players.filter((p) => p.id !== playerModal.id));
            else if (currentOpp) setOpponents(opponents.map((o) => (o.id === currentOpp.id ? { ...o, players: o.players.filter((p) => p.id !== playerModal.id) } : o)));
            setPlayerModal(null);
          } : null}>
          <PlayerForm draft={playerModal} setDraft={setPlayerModal} />
        </Modal>
      )}
    </>
  );
}

/* ============================== JOGOS TAB (wizard + ao vivo) ============================== */
function Wizard({ club, players, opponents, competicoes, setCompeticoes, accent, onCriado, onCancel }) {
  const [step, setStep] = useState(0);
  const [adversarioId, setAdversarioId] = useState(null);
  const [mandante, setMandante] = useState("casa");
  const [competicao, setCompeticao] = useState("");
  const [mostrarNovaCompeticao, setMostrarNovaCompeticao] = useState(false);
  const [novaCompeticaoNome, setNovaCompeticaoNome] = useState("");
  const [estadio, setEstadio] = useState("");
  const [data, setData] = useState("");
  const [convocados, setConvocados] = useState([]);
  const [formacao, setFormacao] = useState("4-3-3");
  const [titulares, setTitulares] = useState({});
  const [capitaoId, setCapitaoId] = useState(null);
  const [pickerSlot, setPickerSlot] = useState(null);
  const [slotMenu, setSlotMenu] = useState(null);

  const adversario = opponents.find((o) => o.id === adversarioId);
  const slots = FORMATIONS[formacao];
  const playerById = (id) => players.find((p) => p.id === id);
  const convocadosDisponiveis = convocados.filter((id) => !Object.values(titulares).includes(id)).map(playerById).filter(Boolean);
  const suplentes = convocados.filter((id) => !Object.values(titulares).includes(id));
  const totalTitulares = Object.keys(titulares).length;

  const toggleConvocado = (id) => setConvocados((prev) => {
    if (prev.includes(id)) {
      setTitulares((t) => { const c = { ...t }; Object.keys(c).forEach((k) => { if (c[k] === id) delete c[k]; }); return c; });
      if (capitaoId === id) setCapitaoId(null);
      return prev.filter((x) => x !== id);
    }
    return [...prev, id];
  });
  const assignSlot = (slotId, playerId) => { setTitulares((prev) => ({ ...prev, [slotId]: playerId })); setPickerSlot(null); };
  const removeSlot = (slotId) => { const pid = titulares[slotId]; if (pid === capitaoId) setCapitaoId(null); setTitulares((prev) => { const c = { ...prev }; delete c[slotId]; return c; }); setSlotMenu(null); };
  const criarCompeticao = () => {
    const nome = novaCompeticaoNome.trim();
    if (!nome) return;
    if (!competicoes.some((c) => c.nome === nome)) setCompeticoes([...competicoes, { id: uid(), nome }]);
    setCompeticao(nome);
    setNovaCompeticaoNome("");
    setMostrarNovaCompeticao(false);
  };

  const finalizarWizard = () => {
    onCriado({ id: uid(), adversarioId, mandante, competicao, estadio, data, formacao, convocados, titulares, capitaoId, criadoEm: new Date().toISOString() });
  };

  return (
    <div style={{ maxWidth: 460, margin: "0 auto" }}>
      <div style={{ textAlign: "center", marginBottom: 4 }}><div style={{ fontSize: 18, fontWeight: 700 }}>Novo Jogo</div><div style={{ fontSize: 13, color: T.sub }}>{["Adversário", "Convocatória", "Onze Inicial", "Resumo"][step]}</div></div>
      <StepDots step={step} total={4} />

      {step === 0 && (
        <>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.sub, marginBottom: 8 }}>ESCOLHER ADVERSÁRIO</div>
          {opponents.length === 0 && <div style={{ color: T.sub, fontSize: 13, marginBottom: 16 }}>Cria um adversário no separador Equipa antes de continuar.</div>}
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 }}>
            {opponents.map((o) => (
              <div key={o.id} onClick={() => setAdversarioId(o.id)} style={{ display: "flex", alignItems: "center", gap: 12, padding: 12, borderRadius: 14, background: adversarioId === o.id ? T.card2 : T.card, border: `1px solid ${adversarioId === o.id ? accent : T.sep}`, cursor: "pointer" }}>
                <Avatar label={o.simbolo} bg={o.corPrimaria} photo={o.foto} /><div style={{ fontWeight: 600 }}>{o.nome}</div>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.sub, marginBottom: 8 }}>MANDANTE</div>
          <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
            <div onClick={() => setMandante("casa")} style={{ flex: 1, textAlign: "center", padding: "12px 0", borderRadius: 14, cursor: "pointer", fontWeight: 700, fontSize: 14, background: mandante === "casa" ? T.text : T.card, color: mandante === "casa" ? "#000" : T.text, border: `1px solid ${T.sep}` }}>🏠 Casa</div>
            <div onClick={() => setMandante("fora")} style={{ flex: 1, textAlign: "center", padding: "12px 0", borderRadius: 14, cursor: "pointer", fontWeight: 700, fontSize: 14, background: mandante === "fora" ? T.text : T.card, color: mandante === "fora" ? "#000" : T.text, border: `1px solid ${T.sep}` }}>✈️ Fora</div>
          </div>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.sub, marginBottom: 8 }}>COMPETIÇÃO</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
            {competicoes.map((c) => (
              <div key={c.id} onClick={() => setCompeticao(c.nome)} style={{ padding: "8px 14px", borderRadius: 12, fontSize: 13, fontWeight: 600, cursor: "pointer", background: competicao === c.nome ? T.text : T.card, color: competicao === c.nome ? "#000" : T.text, border: `1px solid ${T.sep}` }}>📁 {c.nome}</div>
            ))}
            <div onClick={() => setMostrarNovaCompeticao(true)} style={{ padding: "8px 14px", borderRadius: 12, fontSize: 13, fontWeight: 600, cursor: "pointer", background: T.card, color: T.sub, border: `1px dashed ${T.sep}` }}>+ Nova</div>
          </div>
          {mostrarNovaCompeticao && (
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              <input style={inputStyle} placeholder="Nome da nova competição" value={novaCompeticaoNome} onChange={(e) => setNovaCompeticaoNome(e.target.value)} autoFocus />
              <button onClick={criarCompeticao} style={{ background: T.text, color: "#000", border: "none", borderRadius: 10, padding: "0 18px", fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>OK</button>
            </div>
          )}
          <div style={{ marginBottom: 12 }}><input style={inputStyle} placeholder="Estádio" value={estadio} onChange={(e) => setEstadio(e.target.value)} /></div>
          <div style={{ marginBottom: 24 }}><input style={inputStyle} type="date" value={data} onChange={(e) => setData(e.target.value)} /></div>
          <div style={{ display: "flex", gap: 10 }}><GhostBtn onClick={onCancel}>Cancelar</GhostBtn><div style={{ flex: 1 }}><PrimaryBtn disabled={!adversarioId} onClick={() => setStep(1)}>Continuar</PrimaryBtn></div></div>
        </>
      )}

      {step === 1 && (
        <>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}><div style={{ fontSize: 13, fontWeight: 700, color: T.sub }}>PLANTEL</div><div style={{ fontSize: 13, fontWeight: 700, color: accent }}>{convocados.length} convocados</div></div>
          <div style={{ background: T.card, borderRadius: 14, border: `1px solid ${T.sep}`, overflow: "hidden", marginBottom: 20, maxHeight: 380, overflowY: "auto" }}>
            {players.map((p) => {
              const on = convocados.includes(p.id);
              return (
                <div key={p.id} onClick={() => toggleConvocado(p.id)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderBottom: `1px solid ${T.sep}`, cursor: "pointer" }}>
                  <Avatar label={initials(p.nome)} photo={p.foto} size={34} />
                  <div style={{ flex: 1 }}><div style={{ fontSize: 14, fontWeight: 600 }}>{p.nome || "Sem nome"}</div><div style={{ fontSize: 11, color: T.sub }}>{p.posicao} · #{p.numero || "-"}</div></div>
                  <div style={{ width: 22, height: 22, borderRadius: 11, border: `2px solid ${on ? accent : T.sep}`, background: on ? accent : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, color: "#000", fontWeight: 800 }}>{on ? "✓" : ""}</div>
                </div>
              );
            })}
          </div>
          <div style={{ display: "flex", gap: 10 }}><GhostBtn onClick={() => setStep(0)}>‹ Voltar</GhostBtn><div style={{ flex: 1 }}><PrimaryBtn disabled={convocados.length < 11} onClick={() => setStep(2)}>Continuar {convocados.length < 11 ? "(mín. 11)" : ""}</PrimaryBtn></div></div>
        </>
      )}

      {step === 2 && (
        <>
          <div style={{ display: "flex", gap: 8, marginBottom: 14, overflowX: "auto" }}>
            {Object.keys(FORMATIONS).map((f) => (
              <div key={f} onClick={() => { setFormacao(f); setTitulares({}); setCapitaoId(null); }} style={{ padding: "8px 14px", borderRadius: 12, fontSize: 13, fontWeight: 700, whiteSpace: "nowrap", cursor: "pointer", background: formacao === f ? T.text : T.card, color: formacao === f ? "#000" : T.text, border: `1px solid ${T.sep}` }}>{f}</div>
            ))}
          </div>
          <div style={{ fontSize: 12, color: T.sub, marginBottom: 8, textAlign: "center" }}>{totalTitulares}/11 no onze · toca num círculo</div>
          <div style={{ position: "relative", width: "100%", aspectRatio: "0.68", background: "#2e7d32", borderRadius: 16, border: `1px solid ${T.sep}`, marginBottom: 16, overflow: "hidden" }}>
            <GrassStripes />
            <PitchLines />
            {slots.map((slot) => {
              const pid = titulares[slot.id]; const p = pid ? playerById(pid) : null;
              return (
                <div key={slot.id} onClick={() => (p ? setSlotMenu(slot.id) : setPickerSlot(slot.id))} style={{ position: "absolute", left: `${slot.x}%`, top: `${slot.y}%`, transform: "translate(-50%,-50%)", cursor: "pointer", textAlign: "center" }}>
                  <div style={{ width: 38, height: 38, borderRadius: 19, background: p ? "#fff" : "rgba(255,255,255,0.08)", border: `2px solid ${p ? accent : "rgba(255,255,255,0.4)"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, color: p ? accent : "#fff", position: "relative", overflow: "hidden" }}>
                    {p ? (p.foto ? <img src={p.foto} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : initials(p.nome)) : slot.label}
                    {pid === capitaoId && <div style={{ position: "absolute", top: -6, left: -6, width: 16, height: 16, borderRadius: 8, background: T.warning, color: "#000", fontSize: 10, fontWeight: 900, display: "flex", alignItems: "center", justifyContent: "center", border: "1.5px solid #fff" }}>C</div>}
                  </div>
                  <div style={{ fontSize: 10, color: "#fff", marginTop: 2, maxWidth: 64, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", fontWeight: 600 }}>{p ? (p.numero ? `#${p.numero} ${p.nome.split(" ")[0]}` : p.nome.split(" ")[0]) : ""}</div>
                </div>
              );
            })}
          </div>
          <div style={{ fontSize: 12, fontWeight: 700, color: T.sub, marginBottom: 8 }}>SUPLENTES ({suplentes.length})</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 20 }}>
            {suplentes.map((id) => { const p = playerById(id); return p ? (
              <div key={id} style={{ display: "flex", alignItems: "center", gap: 6, background: T.card, border: `1px solid ${T.sep}`, borderRadius: 10, padding: "5px 10px 5px 5px", fontSize: 12 }}>
                <Avatar label={initials(p.nome)} photo={p.foto} size={22} />
                <span>#{p.numero} {p.nome.split(" ")[0]}</span>
              </div>
            ) : null; })}
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <GhostBtn onClick={() => setStep(1)}>‹ Voltar</GhostBtn>
            <div style={{ flex: 1 }}><PrimaryBtn disabled={totalTitulares !== 11 || !capitaoId} onClick={() => setStep(3)}>{totalTitulares !== 11 ? "Completa o onze" : !capitaoId ? "Define o capitão" : "Continuar"}</PrimaryBtn></div>
          </div>
          {pickerSlot && (
            <div onClick={() => setPickerSlot(null)} className="gc-backdrop" style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 60 }}>
              <div onClick={(e) => e.stopPropagation()} className="gc-sheet-up" style={{ background: "rgba(28,28,30,0.94)", borderRadius: "22px 22px 0 0", width: "100%", maxWidth: 460, maxHeight: "60vh", overflowY: "auto", padding: 16, border: "1px solid rgba(255,255,255,0.08)", borderBottom: "none" }}>
                <div style={{ textAlign: "center", fontWeight: 700, marginBottom: 12 }}>Escolher jogador</div>
                {convocadosDisponiveis.map((p) => (
                  <div key={p.id} onClick={() => assignSlot(pickerSlot, p.id)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 8px", borderBottom: `1px solid ${T.sep}`, cursor: "pointer" }}>
                    <Avatar label={initials(p.nome)} photo={p.foto} size={34} /><div style={{ flex: 1, fontSize: 14, fontWeight: 600 }}>{p.nome}</div><div style={{ fontSize: 12, color: T.sub }}>{p.posicao} · #{p.numero}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {slotMenu && (
            <div onClick={() => setSlotMenu(null)} className="gc-backdrop" style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60 }}>
              <div onClick={(e) => e.stopPropagation()} className="gc-sheet-center" style={{ background: "rgba(28,28,30,0.94)", borderRadius: 18, padding: 8, width: 260, maxWidth: "90vw", border: "1px solid rgba(255,255,255,0.08)", boxShadow: "0 28px 70px rgba(0,0,0,0.55)" }}>
                <div onClick={() => { setCapitaoId(titulares[slotMenu]); setSlotMenu(null); }} style={{ padding: "12px 14px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>Definir como Capitão</div>
                <div style={{ height: 1, background: T.sep }} />
                <div onClick={() => { setPickerSlot(slotMenu); setSlotMenu(null); }} style={{ padding: "12px 14px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>Trocar jogador</div>
                <div style={{ height: 1, background: T.sep }} />
                <div onClick={() => removeSlot(slotMenu)} style={{ padding: "12px 14px", fontSize: 14, fontWeight: 600, color: T.danger, cursor: "pointer" }}>Remover</div>
              </div>
            </div>
          )}
        </>
      )}

      {step === 3 && adversario && (
        <>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 20, marginBottom: 16 }}>
            {mandante === "casa" ? (
              <>
                <div style={{ textAlign: "center" }}><Avatar label={club.simbolo} bg={club.corPrimaria} size={48} photo={club.foto} /><div style={{ fontSize: 12, marginTop: 6 }}>{club.nome}</div></div>
                <div style={{ fontSize: 13, color: T.sub }}>vs</div>
                <div style={{ textAlign: "center" }}><Avatar label={adversario.simbolo} bg={adversario.corPrimaria} size={48} photo={adversario.foto} /><div style={{ fontSize: 12, marginTop: 6 }}>{adversario.nome}</div></div>
              </>
            ) : (
              <>
                <div style={{ textAlign: "center" }}><Avatar label={adversario.simbolo} bg={adversario.corPrimaria} size={48} photo={adversario.foto} /><div style={{ fontSize: 12, marginTop: 6 }}>{adversario.nome}</div></div>
                <div style={{ fontSize: 13, color: T.sub }}>vs</div>
                <div style={{ textAlign: "center" }}><Avatar label={club.simbolo} bg={club.corPrimaria} size={48} photo={club.foto} /><div style={{ fontSize: 12, marginTop: 6 }}>{club.nome}</div></div>
              </>
            )}
          </div>
          <div style={{ textAlign: "center", marginBottom: 16 }}>
            <span style={{ fontSize: 11, fontWeight: 700, background: T.card2, padding: "5px 12px", borderRadius: 10 }}>{mandante === "casa" ? "🏠 Jogo em Casa" : "✈️ Jogo Fora"}</span>
          </div>
          <div style={{ background: T.card, border: `1px solid ${T.sep}`, borderRadius: 14, padding: 16, marginBottom: 16, fontSize: 13, color: T.sub }}>
            <div>{competicao || "Competição por definir"}</div><div>{estadio || "Estádio por definir"} {data ? `· ${data}` : ""}</div><div>Sistema tático: <span style={{ color: T.text, fontWeight: 700 }}>{formacao}</span></div>
          </div>
          <div style={{ display: "flex", gap: 10 }}><GhostBtn onClick={() => setStep(2)}>‹ Voltar</GhostBtn><div style={{ flex: 1 }}><PrimaryBtn onClick={finalizarWizard}>Guardar e Preparar Jogo</PrimaryBtn></div></div>
        </>
      )}
    </div>
  );
}

function AoVivo({ club, players, opponents, game, onTerminar, onVoltar, onAtualizar, accent }) {
  const adversario = opponents.find((o) => o.id === game.adversarioId);
  const accentAdv = accessibleAccent(adversario?.corPrimaria);
  const plantelFora = adversario?.players || [];
  const convocadosCasa = players.filter((p) => game.convocados.includes(p.id));

  const [secondsBase, setSecondsBase] = useState(() => game.relogioBase ?? game.duracaoSegundos ?? 0);
  const [startedAt, setStartedAt] = useState(() => (game.relogioRunning ? (game.relogioStartedAt || Date.now()) : null));
  const [running, setRunning] = useState(() => !!game.relogioRunning && !isTerminado(game));
  const [, setTick] = useState(0);
  const [actions, setActions] = useState(game.actions || []);
  const [passes, setPasses] = useState(game.passes || { casa: { certo: 0, errado: 0, primeira: { certo: 0, errado: 0 }, segunda: { certo: 0, errado: 0 } }, fora: { certo: 0, errado: 0, primeira: { certo: 0, errado: 0 }, segunda: { certo: 0, errado: 0 } } });
  const [pontapes, setPontapes] = useState(game.pontapes || { casa: 0, fora: 0 });
  const [ended, setEnded] = useState(isTerminado(game));
  const [intervalo, setIntervalo] = useState(() => !!game.intervaloAtivo);
  const [intervaloAos, setIntervaloAos] = useState(game.intervaloAos ?? null);
  const [segundaParteIniciada, setSegundaParteIniciada] = useState(() => (game.actions || []).some((a) => a.periodo === "2"));
  const [pendingRegistration, setPendingRegistration] = useState(null);
  const [pickerAction, setPickerAction] = useState(null);
  const [subStage, setSubStage] = useState(null);
  const [showTimeline, setShowTimeline] = useState(false);
  const [onPitchCasa, setOnPitchCasa] = useState(() => {
    const s = new Set(Object.values(game.titulares || {}));
    (game.actions || []).filter((a) => a.tipo === "Substituição" && a.equipa === "casa").forEach((sub) => { s.delete(sub.saiuId); s.add(sub.jogador); });
    return s;
  });
  const [onPitchFora, setOnPitchFora] = useState(() => {
    const s = new Set(plantelFora.map((p) => p.id));
    (game.actions || []).filter((a) => a.tipo === "Substituição" && a.equipa === "fora").forEach((sub) => { s.delete(sub.saiuId); s.add(sub.jogador); });
    return s;
  });
  const fieldRef = useRef(null);

  // Relógio baseado em hora real (não num contador local) — continua correto mesmo que
  // este ecrã seja desmontado (ex.: ao mudar de separador) e voltes a abri-lo mais tarde.
  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => setTick((t) => t + 1), 1000);
    return () => clearInterval(id);
  }, [running]);
  const seconds = running && startedAt ? secondsBase + Math.floor((Date.now() - startedAt) / 1000) : secondsBase;

  // Guarda o progresso automaticamente (cronómetro, ações, substituições…) para nunca se perder
  // se saíres deste ecrã antes de teres carregado em "Fim de Jogo".
  useEffect(() => {
    if (!onAtualizar || ended) return;
    onAtualizar({
      id: game.id, actions, passes, pontapes,
      relogioBase: secondsBase, relogioStartedAt: startedAt, relogioRunning: running,
      intervaloAtivo: intervalo, intervaloAos, duracaoSegundos: seconds,
      onPitchCasa: Array.from(onPitchCasa), onPitchFora: Array.from(onPitchFora),
    });
    // eslint-disable-next-line
  }, [actions, passes, pontapes, secondsBase, startedAt, running, intervalo, intervaloAos, onPitchCasa, onPitchFora]);

  const score = useMemo(() => {
    let casa = 0, fora = 0;
    actions.forEach((a) => { if (a.tipo === "Golo" || a.tipo === "Golo Penálti") { if (a.equipa === "casa") casa++; else fora++; } if (a.tipo === "Autogolo") { if (a.equipa === "casa") fora++; else casa++; } });
    return { casa, fora };
  }, [actions]);
  const minutoBruto = minutoFromSeconds(seconds);
  const minuto = minutoBruto;
  const minutoTexto = !segundaParteIniciada
    ? (minutoBruto > 45 ? `45+${minutoBruto - 45}` : `${minutoBruto}`)
    : (minutoBruto > 90 ? `90+${minutoBruto - 90}` : `${minutoBruto}`);

  const liveStats = useMemo(() => {
    const count = (tipo, equipa) => actions.filter((a) => a.tipo === tipo && a.equipa === equipa).length;
    const totalPassesCasa = passes.casa.certo + passes.casa.errado, totalPassesFora = passes.fora.certo + passes.fora.errado, tot = totalPassesCasa + totalPassesFora || 1;
    const posseCasa = Math.round((totalPassesCasa / tot) * 100);
    return {
      rematesBaliza: { casa: count("Remate à Baliza", "casa"), fora: count("Remate à Baliza", "fora") },
      rematesFora: { casa: count("Remate para Fora", "casa"), fora: count("Remate para Fora", "fora") },
      rematesBloqueados: { casa: count("Remate Bloqueado", "casa"), fora: count("Remate Bloqueado", "fora") },
      cantos: { casa: count("Canto", "casa"), fora: count("Canto", "fora") },
      foraDeJogo: { casa: count("Fora de Jogo", "casa"), fora: count("Fora de Jogo", "fora") },
      faltas: { casa: count("Falta Cometida", "casa"), fora: count("Falta Cometida", "fora") },
      amarelos: { casa: count("Cartão Amarelo", "casa"), fora: count("Cartão Amarelo", "fora") },
      vermelhos: { casa: count("Cartão Vermelho", "casa"), fora: count("Cartão Vermelho", "fora") },
      posse: { casa: posseCasa, fora: 100 - posseCasa },
    };
  }, [actions, passes]);

  const handleFieldTap = (e) => {
    if (ended || !pendingRegistration) return;
    const rect = fieldRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX, clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const x = Math.min(100, Math.max(0, ((clientX - rect.left) / rect.width) * 100));
    const y = Math.min(100, Math.max(0, ((clientY - rect.top) / rect.height) * 100));
    const nova = { id: uid(), minuto, periodo: segundaParteIniciada ? "2" : "1", equipa: pendingRegistration.equipa, jogador: pendingRegistration.jogador, tipo: pendingRegistration.tipo, x, y };
    setActions((prev) => {
      const lista = [nova, ...prev];
      // Um golo em jogo aberto conta sempre também como remate à baliza (golo de penálti não conta)
      if (nova.tipo === "Golo") {
        lista.unshift({ id: uid(), minuto, periodo: nova.periodo, equipa: nova.equipa, jogador: nova.jogador, tipo: "Remate à Baliza", x, y });
      }
      // Uma falta sofrida por uma equipa conta sempre também como falta cometida da equipa contrária
      if (nova.tipo === "Falta Sofrida") {
        const equipaContraria = nova.equipa === "casa" ? "fora" : "casa";
        lista.unshift({ id: uid(), minuto, periodo: nova.periodo, equipa: equipaContraria, jogador: null, tipo: "Falta Cometida", x, y });
      }
      return lista;
    });
    setPendingRegistration(null);
  };
  const registerPontape = (equipa) => { if (ended || intervalo) return; setPontapes((prev) => ({ ...prev, [equipa]: prev[equipa] + 1 })); };
  const openActionPicker = (tipo) => {
    if (ended || intervalo || pendingRegistration) return;
    if (tipo === "Substituição") { setSubStage({ equipa: null, saiu: null }); return; }
    setPickerAction({ tipo });
  };
  const registerAction = (equipa, jogadorId) => {
    if (!pickerAction) return;
    setPendingRegistration({ tipo: pickerAction.tipo, equipa, jogador: jogadorId });
    setPickerAction(null);
  };
  const registerPass = (equipa, certo) => {
    if (ended || intervalo) return;
    const chave = certo ? "certo" : "errado";
    const parte = segundaParteIniciada ? "segunda" : "primeira";
    setPasses((prev) => {
      const equipaAtual = prev[equipa] || { certo: 0, errado: 0, primeira: { certo: 0, errado: 0 }, segunda: { certo: 0, errado: 0 } };
      const parteAtual = equipaAtual[parte] || { certo: 0, errado: 0 };
      return { ...prev, [equipa]: { ...equipaAtual, [chave]: equipaAtual[chave] + 1, [parte]: { ...parteAtual, [chave]: parteAtual[chave] + 1 } } };
    });
  };
  const escolherEquipaSub = (equipa) => setSubStage({ equipa, saiu: null });
  const registerSubstitution = (playerId) => {
    if (!subStage || !subStage.equipa) return;
    if (subStage.saiu === null) { setSubStage({ ...subStage, saiu: playerId }); return; }
    const entrou = playerId, saiu = subStage.saiu;
    setActions((prev) => [{ id: uid(), minuto, periodo: segundaParteIniciada ? "2" : "1", equipa: subStage.equipa, tipo: "Substituição", jogador: entrou, saiuId: saiu, x: 50, y: 50 }, ...prev]);
    if (subStage.equipa === "casa") setOnPitchCasa((prev) => { const s = new Set(prev); s.delete(saiu); s.add(entrou); return s; });
    else setOnPitchFora((prev) => { const s = new Set(prev); s.delete(saiu); s.add(entrou); return s; });
    setSubStage(null);
  };
  const nomeJogador = (equipa, id) => (equipa === "casa" ? players : plantelFora).find((p) => p.id === id)?.nome || "—";
  const alternarRunning = () => {
    if (running) { setSecondsBase(seconds); setStartedAt(null); setRunning(false); }
    else { setStartedAt(Date.now()); setRunning(true); }
  };
  const marcarIntervalo = () => { setSecondsBase(seconds); setStartedAt(null); setRunning(false); setIntervalo(true); if (intervaloAos === null) setIntervaloAos(seconds); };
  const iniciarSegundaParte = () => { setIntervalo(false); setSecondsBase(2700); setStartedAt(Date.now()); setRunning(true); setSegundaParteIniciada(true); };
  const finalizarJogo = () => { setSecondsBase(seconds); setStartedAt(null); setRunning(false); setEnded(true); onTerminar({ ...game, actions, passes, pontapes, score, duracaoSegundos: seconds, intervaloAos, relogioRunning: false, relogioStartedAt: null, relogioBase: seconds, intervaloAtivo: false, terminadoEm: new Date().toISOString() }); };

  const subCandidatesOut = subStage && subStage.equipa ? (subStage.equipa === "casa" ? [...onPitchCasa].map((id) => players.find((p) => p.id === id)).filter(Boolean) : [...onPitchFora].map((id) => plantelFora.find((p) => p.id === id)).filter(Boolean)) : [];
  const subCandidatesIn = subStage && subStage.equipa ? (subStage.equipa === "casa" ? convocadosCasa.filter((p) => !onPitchCasa.has(p.id)) : plantelFora.filter((p) => !onPitchFora.has(p.id))) : [];
  const pickerCasaList = pickerAction ? (CARD_TIPOS.has(pickerAction.tipo) ? convocadosCasa : convocadosCasa.filter((p) => onPitchCasa.has(p.id))) : [];
  const pickerForaList = pickerAction ? (CARD_TIPOS.has(pickerAction.tipo) ? plantelFora : plantelFora.filter((p) => onPitchFora.has(p.id))) : [];

  return (
    <div style={{ maxWidth: "100%", margin: "0 auto" }}>
      <GhostBtn onClick={onVoltar}>‹ Jogos</GhostBtn>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 18, margin: "10px 0" }}>
        {game.mandante === "fora" ? (
          <>
            <div style={{ textAlign: "center" }}><Avatar label={adversario?.simbolo || "ADV"} bg={adversario?.corPrimaria} size={36} photo={adversario?.foto} /><div style={{ fontSize: 11, marginTop: 4 }}>{adversario?.nome}</div></div>
            <div style={{ fontSize: 26, fontWeight: 800 }}>{score.fora} : {score.casa}</div>
            <div style={{ textAlign: "center" }}><Avatar label={club.simbolo} bg={club.corPrimaria} size={36} photo={club.foto} /><div style={{ fontSize: 11, marginTop: 4 }}>{club.nome}</div></div>
          </>
        ) : (
          <>
            <div style={{ textAlign: "center" }}><Avatar label={club.simbolo} bg={club.corPrimaria} size={36} photo={club.foto} /><div style={{ fontSize: 11, marginTop: 4 }}>{club.nome}</div></div>
            <div style={{ fontSize: 26, fontWeight: 800 }}>{score.casa} : {score.fora}</div>
            <div style={{ textAlign: "center" }}><Avatar label={adversario?.simbolo || "ADV"} bg={adversario?.corPrimaria} size={36} photo={adversario?.foto} /><div style={{ fontSize: 11, marginTop: 4 }}>{adversario?.nome}</div></div>
          </>
        )}
      </div>
      <div style={{ textAlign: "center", marginBottom: 8 }}>
        <span style={{ fontSize: 10, fontWeight: 700, color: T.sub, background: T.card, padding: "3px 10px", borderRadius: 8 }}>{game.mandante === "fora" ? "✈️ Fora" : "🏠 Casa"}</span>
      </div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 14, flexWrap: "wrap" }}>
        <div style={{ fontSize: 20, fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>{fmtClock(seconds)}</div>
        <div style={{ fontSize: 12, color: T.sub }}>min {minutoTexto}</div>
        {!ended ? (
          <>
            {intervalo ? (
              <span style={{ fontSize: 11, fontWeight: 700, color: T.warning, background: "rgba(255,214,10,0.15)", padding: "5px 10px", borderRadius: 8 }}>⏸ Intervalo</span>
            ) : (
              <button onClick={alternarRunning} style={{ background: T.card2, border: `1px solid ${T.sep}`, color: T.text, borderRadius: 10, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>{running ? "Pausar" : "Iniciar"}</button>
            )}
            {intervalo ? (
              <button onClick={iniciarSegundaParte} style={{ background: T.success, border: "none", color: "#000", borderRadius: 10, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>▶️ Iniciar 2ª Parte</button>
            ) : (
              <button onClick={marcarIntervalo} disabled={intervaloAos !== null} style={{ background: "transparent", border: `1px solid ${T.sep}`, color: intervaloAos !== null ? T.sub : T.text, borderRadius: 10, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: intervaloAos !== null ? "default" : "pointer", fontFamily: FONT }}>⏸ Intervalo</button>
            )}
            <button onClick={finalizarJogo} style={{ background: "transparent", border: `1px solid ${T.danger}`, color: T.danger, borderRadius: 10, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>🏁 Fim de Jogo</button>
          </>
        ) : <span style={{ color: T.success, fontSize: 12, fontWeight: 700 }}>Jogo terminado</span>}
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", gap: 10, marginBottom: 12 }}>
        {game.mandante === "fora" ? (
          <>
            <div style={{ flex: 1, background: T.card, border: `1px solid ${T.sep}`, borderRadius: 12, padding: 10 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: T.sub, marginBottom: 6 }}>PASSES · ADVERSÁRIO</div>
              <div style={{ display: "flex", gap: 6 }}><button disabled={ended || intervalo} onClick={() => registerPass("fora", true)} style={{ flex: 1, background: T.success, border: "none", borderRadius: 8, padding: "8px 0", fontWeight: 800, color: "#000", fontSize: 12, cursor: "pointer" }}>✓ {passes.fora.certo}</button><button disabled={ended || intervalo} onClick={() => registerPass("fora", false)} style={{ flex: 1, background: T.danger, border: "none", borderRadius: 8, padding: "8px 0", fontWeight: 800, color: "#000", fontSize: 12, cursor: "pointer" }}>✕ {passes.fora.errado}</button></div>
            </div>
            <div style={{ flex: 1, background: T.card, border: `1px solid ${T.sep}`, borderRadius: 12, padding: 10 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: T.sub, marginBottom: 6, textAlign: "right" }}>PASSES · MINHA EQUIPA</div>
              <div style={{ display: "flex", gap: 6 }}><button disabled={ended || intervalo} onClick={() => registerPass("casa", false)} style={{ flex: 1, background: T.danger, border: "none", borderRadius: 8, padding: "8px 0", fontWeight: 800, color: "#000", fontSize: 12, cursor: "pointer" }}>✕ {passes.casa.errado}</button><button disabled={ended || intervalo} onClick={() => registerPass("casa", true)} style={{ flex: 1, background: T.success, border: "none", borderRadius: 8, padding: "8px 0", fontWeight: 800, color: "#000", fontSize: 12, cursor: "pointer" }}>✓ {passes.casa.certo}</button></div>
            </div>
          </>
        ) : (
          <>
            <div style={{ flex: 1, background: T.card, border: `1px solid ${T.sep}`, borderRadius: 12, padding: 10 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: T.sub, marginBottom: 6 }}>PASSES · MINHA EQUIPA</div>
              <div style={{ display: "flex", gap: 6 }}><button disabled={ended || intervalo} onClick={() => registerPass("casa", true)} style={{ flex: 1, background: T.success, border: "none", borderRadius: 8, padding: "8px 0", fontWeight: 800, color: "#000", fontSize: 12, cursor: "pointer" }}>✓ {passes.casa.certo}</button><button disabled={ended || intervalo} onClick={() => registerPass("casa", false)} style={{ flex: 1, background: T.danger, border: "none", borderRadius: 8, padding: "8px 0", fontWeight: 800, color: "#000", fontSize: 12, cursor: "pointer" }}>✕ {passes.casa.errado}</button></div>
            </div>
            <div style={{ flex: 1, background: T.card, border: `1px solid ${T.sep}`, borderRadius: 12, padding: 10 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: T.sub, marginBottom: 6, textAlign: "right" }}>PASSES · ADVERSÁRIO</div>
              <div style={{ display: "flex", gap: 6 }}><button disabled={ended || intervalo} onClick={() => registerPass("fora", false)} style={{ flex: 1, background: T.danger, border: "none", borderRadius: 8, padding: "8px 0", fontWeight: 800, color: "#000", fontSize: 12, cursor: "pointer" }}>✕ {passes.fora.errado}</button><button disabled={ended || intervalo} onClick={() => registerPass("fora", true)} style={{ flex: 1, background: T.success, border: "none", borderRadius: 8, padding: "8px 0", fontWeight: 800, color: "#000", fontSize: 12, cursor: "pointer" }}>✓ {passes.fora.certo}</button></div>
            </div>
          </>
        )}
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", gap: 10, marginBottom: 12 }}>

function JogosTab({ club, players, opponents, games, setGames, competicoes, setCompeticoes, accent, goToReport }) {
  const [view, setView] = useState("lista");
  const [liveId, setLiveId] = useState(null);
  const liveGame = games.find((g) => g.id === liveId);

  const criarJogo = (jogo) => { setGames([...games, jogo]); setLiveId(jogo.id); setView("ao-vivo"); };
  const terminarJogo = (jogoAtualizado) => { setGames(games.map((g) => (g.id === jogoAtualizado.id ? jogoAtualizado : g))); };
  const atualizarJogoAoVivo = (parcial) => setGames(games.map((g) => (g.id === parcial.id ? { ...g, ...parcial } : g)));

  return (
    <>
      {view === "lista" && (
        <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <div style={{ fontSize: 15, fontWeight: 700 }}>Jogos</div>
            <button onClick={() => setView("wizard")} style={{ width: 34, height: 34, borderRadius: 17, background: T.card, border: `1px solid ${T.sep}`, color: T.text, fontSize: 18, cursor: "pointer", fontFamily: FONT }}>+</button>
          </div>
          {games.length === 0 && <div style={{ textAlign: "center", color: T.sub, padding: 30, fontSize: 14 }}>Ainda sem jogos. Toca em "+" para preparar o primeiro.</div>}
          {[...games].reverse().map((g) => {
            const adv = opponents.find((o) => o.id === g.adversarioId);
            const done = isTerminado(g);
            return (
              <div key={g.id} onClick={() => { if (done) goToReport(g.id); else { setLiveId(g.id); setView("ao-vivo"); } }} style={{ display: "flex", alignItems: "center", gap: 14, background: T.card, border: `1px solid ${T.sep}`, borderRadius: 16, padding: 14, marginBottom: 10, cursor: "pointer" }}>
                <Avatar label={g.mandante === "fora" ? (adv?.simbolo || "ADV") : club.simbolo} bg={g.mandante === "fora" ? adv?.corPrimaria : club.corPrimaria} size={34} photo={g.mandante === "fora" ? adv?.foto : club.foto} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 700 }}>
                    {g.mandante === "fora" ? `${adv?.nome || "?"} vs ${club.nome}` : `${club.nome} vs ${adv?.nome || "?"}`}
                    <span style={{ marginLeft: 8, fontSize: 10, fontWeight: 700, color: T.sub }}>{g.mandante === "fora" ? "✈️" : "🏠"}</span>
                  </div>
                  <div style={{ fontSize: 12, color: T.sub }}>{g.competicao || "Competição"} · {g.data || "sem data"}</div>
                </div>
                {done ? <div style={{ fontSize: 15, fontWeight: 800 }}>{g.mandante === "fora" ? `${g.score.fora} : ${g.score.casa}` : `${g.score.casa} : ${g.score.fora}`}</div> : <span style={{ fontSize: 11, fontWeight: 700, color: T.warning, background: "rgba(255,214,10,0.15)", padding: "4px 10px", borderRadius: 8 }}>Por realizar</span>}
              </div>
            );
          })}
        </>
      )}
      {view === "wizard" && <Wizard club={club} players={players} opponents={opponents} competicoes={competicoes} setCompeticoes={setCompeticoes} accent={accent} onCriado={criarJogo} onCancel={() => setView("lista")} />}
      {view === "ao-vivo" && liveGame && <AoVivo club={club} players={players} opponents={opponents} game={liveGame} accent={accent} onTerminar={(g) => { terminarJogo(g); setView("lista"); }} onAtualizar={atualizarJogoAoVivo} onVoltar={() => setView("lista")} />}
    </>
  );
}

function DetailSheet({ def, draft, setDraft, onConfirm, onClose }) {

  return (
    <div onClick={onClose} className="gc-backdrop" style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 65 }}>

        {def.extra && (
          <>
            <div style={{ fontSize: 11, fontWeight: 700, color: T.sub, marginBottom: 8 }}>{def.extraLabel}{def.extraOpcional ? " · opcional, toca antes de escolher o resto" : ""}</div>

              ))}

function calcularStatsGR(acoes) {
  const c = (tipo) => acoes.filter((a) => a.tipo === tipo).length;
  const cPe = (tipo, pe) => acoes.filter((a) => a.tipo === tipo && a.pe === pe).length;
  const curtosCertos = c("Passe Curto Certo"), curtosErrados = c("Passe Curto Errado");
  const longosCertos = c("Passe Longo Certo"), longosErrados = c("Passe Longo Errado");
  const totalCurtos = curtosCertos + curtosErrados, totalLongos = longosCertos + longosErrados;
  const defesaEventos = acoes.filter((a) => a.tipo === "Defesa");
  const golosSofridos = defesaEventos.filter((a) => a.resultado === "Golo Sofrido").length;
  const defesasRealizadas = defesaEventos.length - golosSofridos;
  const controlos = acoes.filter((a) => a.tipo === "Controlo de Profundidade");
  const socos = acoes.filter((a) => a.tipo === "Soco");
  const duelos = acoes.filter((a) => a.tipo === "Duelo Aéreo");
  const duelosGanhos = duelos.filter((a) => a.resultado === "Ganho").length;
  const duelosPerdidos = duelos.filter((a) => a.resultado === "Perdido").length;
  return {
    totalCurtos, curtosCertos, curtosErrados, curtosPercent: totalCurtos ? Math.round((curtosCertos / totalCurtos) * 100) : 0,
    curtosEsquerdo: cPe("Passe Curto Certo", "Esquerdo") + cPe("Passe Curto Errado", "Esquerdo"), curtosDireito: cPe("Passe Curto Certo", "Direito") + cPe("Passe Curto Errado", "Direito"),
    totalLongos, longosCertos, longosErrados, longosPercent: totalLongos ? Math.round((longosCertos / totalLongos) * 100) : 0,
    longosEsquerdo: cPe("Passe Longo Certo", "Esquerdo") + cPe("Passe Longo Errado", "Esquerdo"), longosDireito: cPe("Passe Longo Certo", "Direito") + cPe("Passe Longo Errado", "Direito"),
    controlos: controlos.length, controlosComSucesso: controlos.filter((a) => a.resultado === "Com Sucesso").length, controlosSemSucesso: controlos.filter((a) => a.resultado === "Sem Sucesso").length,
    totalDefesaEventos: defesaEventos.length, defesasRealizadas, golosSofridos,
    defesasPercent: defesaEventos.length ? Math.round((defesasRealizadas / defesaEventos.length) * 100) : 0,
    socos: socos.length, socosEficazes: socos.filter((a) => a.resultado === "Eficaz" || a.resultado === "Para Zona Segura").length, socosIneficazes: socos.filter((a) => a.resultado === "Incompleto" || a.resultado === "Para Zona Perigosa").length,
    duelos: duelos.length, duelosGanhos, duelosPerdidos, duelosPercent: (duelosGanhos + duelosPerdidos) ? Math.round((duelosGanhos / (duelosGanhos + duelosPerdidos)) * 100) : 0,
  };
}
function calcularStatsCampo(acoes) {
  const c = (tipo) => acoes.filter((a) => a.tipo === tipo).length;
  const cPe = (tipo, pe) => acoes.filter((a) => a.tipo === tipo && a.pe === pe).length;
  const golos = c("Golo"), assistencias = c("Assistência");
  const passesCertos = c("Passe Certo"), passesErrados = c("Passe Errado"), passesChave = c("Passe-chave");
  const totalPasses = passesCertos + passesErrados;
  const rematesBaliza = c("Remate à Baliza"), rematesFora = c("Remate para Fora");
  const rematesTotais = rematesBaliza + rematesFora;
  const cartoesAmarelos = c("Cartão Amarelo") + acoes.filter((a) => a.tipo === "Falta Cometida" && a.resultado === "Cartão Amarelo").length;
  const cartoesVermelhos = c("Cartão Vermelho") + acoes.filter((a) => a.tipo === "Falta Cometida" && a.resultado === "Cartão Vermelho").length;
  const intercecoes = acoes.filter((a) => a.tipo === "Interceção");
  return {
    golos, assistencias, participacoesGolo: golos + assistencias,
    totalPasses, passesCertos, passesErrados, passesPercent: totalPasses ? Math.round((passesCertos / totalPasses) * 100) : 0,
    passesChave, passesEsquerdo: cPe("Passe Certo", "Esquerdo") + cPe("Passe Errado", "Esquerdo"), passesDireito: cPe("Passe Certo", "Direito") + cPe("Passe Errado", "Direito"),
    rematesTotais, rematesBaliza, rematesFora,
    rematesPercent: rematesTotais ? Math.round((rematesBaliza / rematesTotais) * 100) : 0,
    conversaoPercent: rematesTotais ? Math.round((golos / rematesTotais) * 100) : 0,
    foraDeJogo: c("Fora de Jogo"),
    intercecoes: intercecoes.length, intercecoesComPosse: intercecoes.filter((a) => a.resultado === "Com Manutenção da Posse").length, intercecoesSemPosse: intercecoes.filter((a) => a.resultado === "Sem Manutenção da Posse").length,
    autogolos: c("Autogolo"), faltasCometidas: c("Falta Cometida"), faltasSofridas: c("Falta Sofrida"),
    cartoesAmarelos, cartoesVermelhos,
  };
}

function AnaliseAoVivo({ club, players, opponents, analise, accent, onTerminar, onVoltar, onAtualizar }) {
  const adversario = opponents.find((o) => o.id === analise.adversarioId);
  const isGR = analise.jogadorSnapshot.posicao === "GR";
  const catalogo = isGR ? ACOES_GR : ACOES_CAMPO;

  const [secondsBase, setSecondsBase] = useState(() => analise.relogioBase ?? analise.duracaoSegundos ?? 0);
  const [startedAt, setStartedAt] = useState(() => (analise.relogioRunning ? (analise.relogioStartedAt || Date.now()) : null));
  const [running, setRunning] = useState(() => !!analise.relogioRunning && !analise.terminadoEm);
  const [, setTick] = useState(0);
  const [intervalo, setIntervalo] = useState(() => !!analise.intervaloAtivo);
  const [intervaloAos, setIntervaloAos] = useState(analise.intervaloAos ?? null);
  const [segundaParteIniciada, setSegundaParteIniciada] = useState(() => !!analise.segundaParteIniciada || (analise.acoes || []).some((a) => a.periodo === "2ª Parte"));
  const [acoes, setAcoes] = useState(analise.acoes || []);
  const [scoreManual, setScoreManual] = useState(analise.scoreManual || { casa: 0, fora: 0 });
  const [ended, setEnded] = useState(!!analise.terminadoEm);
  const [pickerDef, setPickerDef] = useState(null);
  const [detalheDraft, setDetalheDraft] = useState({});
  const [pendingRegistration, setPendingRegistration] = useState(null);
  const [showTimeline, setShowTimeline] = useState(false);
  const fieldRef = useRef(null);

  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => setTick((t) => t + 1), 1000);
    return () => clearInterval(id);
  }, [running]);
  const seconds = running && startedAt ? secondsBase + Math.floor((Date.now() - startedAt) / 1000) : secondsBase;

  useEffect(() => {
    if (!onAtualizar || ended) return;
    onAtualizar({
      id: analise.id, acoes, scoreManual,
      relogioBase: secondsBase, relogioStartedAt: startedAt, relogioRunning: running,
      intervaloAtivo: intervalo, intervaloAos, segundaParteIniciada, duracaoSegundos: seconds,
    });
    // eslint-disable-next-line
  }, [acoes, scoreManual, secondsBase, startedAt, running, intervalo, intervaloAos, segundaParteIniciada]);

  const minutoBruto = minutoFromSeconds(seconds);
  const minuto = minutoBruto;
  const minutoTexto = !segundaParteIniciada
    ? (minutoBruto > 45 ? `45+${minutoBruto - 45}` : `${minutoBruto}`)
    : (minutoBruto > 90 ? `90+${minutoBruto - 90}` : `${minutoBruto}`);
  const periodoAtual = segundaParteIniciada ? "2ª Parte" : "1ª Parte";
  const minutosAnalisados = Math.max(0, minuto - (analise.titular ? 1 : analise.minutoEntrada) + 1);
  const stats = useMemo(() => (isGR ? calcularStatsGR(acoes) : calcularStatsCampo(acoes)), [acoes, isGR]);

  const abrirAcao = (def) => {
    if (ended || intervalo || pendingRegistration) return;
    if (def.pe || def.resultados || def.extra) { setPickerDef(def); setDetalheDraft({}); }
    else setPendingRegistration({ tipo: def.tipo });
  };
  const confirmarDetalhe = () => {
    const reg = { tipo: pickerDef.tipo };
    if (detalheDraft.pe) reg.pe = detalheDraft.pe;
    if (detalheDraft.resultado) reg.resultado = detalheDraft.resultado;
    if (detalheDraft.extra) reg.extra = detalheDraft.extra;
    setPendingRegistration(reg);
    setPickerDef(null);
  };
  const handleFieldTap = (e) => {
    if (ended || !pendingRegistration) return;
    const rect = fieldRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX, clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const x = Math.min(100, Math.max(0, ((clientX - rect.left) / rect.width) * 100));
    const y = Math.min(100, Math.max(0, ((clientY - rect.top) / rect.height) * 100));
    const base = { minuto, segundo: seconds % 60, periodo: periodoAtual, x, y };
    const nova = { id: uid(), ...pendingRegistration, ...base };
    setAcoes((prev) => {
      let lista = [nova, ...prev];
      if (nova.tipo === "Golo") lista.unshift({ id: uid(), tipo: "Remate à Baliza", ...(nova.pe ? { pe: nova.pe } : {}), ...base });
      if (nova.tipo === "Passe-chave") lista.unshift({ id: uid(), tipo: "Passe Certo", ...(nova.pe ? { pe: nova.pe } : {}), ...base });
      return lista;
    });
    setPendingRegistration(null);
  };
  const desfazer = () => setAcoes((prev) => prev.slice(1));
  const eliminarAcao = (id) => setAcoes((prev) => prev.filter((a) => a.id !== id));
  const editarMinuto = (id, novoMinuto) => setAcoes((prev) => prev.map((a) => (a.id === id ? { ...a, minuto: novoMinuto } : a)));
  const alternarRunning = () => {
    if (running) { setSecondsBase(seconds); setStartedAt(null); setRunning(false); }
    else { setStartedAt(Date.now()); setRunning(true); }
  };
  const marcarIntervalo = () => { setSecondsBase(seconds); setStartedAt(null); setRunning(false); setIntervalo(true); if (intervaloAos === null) setIntervaloAos(seconds); };
  const iniciarSegundaParte = () => { setIntervalo(false); setSecondsBase(2700); setStartedAt(Date.now()); setRunning(true); setSegundaParteIniciada(true); };
  const finalizar = () => { setSecondsBase(seconds); setStartedAt(null); setRunning(false); setEnded(true); onTerminar({ ...analise, acoes, scoreManual, duracaoSegundos: seconds, intervaloAos, relogioRunning: false, relogioStartedAt: null, relogioBase: seconds, intervaloAtivo: false, segundaParteIniciada, minutosAnalisados, terminadoEm: new Date().toISOString() }); };

  return (
    <div style={{ maxWidth: "100%", margin: "0 auto" }}>
      <GhostBtn onClick={onVoltar}>‹ Análise Individual</GhostBtn>

      <div style={{ display: "flex", alignItems: "center", gap: 14, margin: "12px 0", background: T.card, border: `1px solid ${T.sep}`, borderRadius: 16, padding: 14, flexWrap: "wrap" }}>
        <Avatar label={initials(analise.jogadorSnapshot.nome)} photo={analise.jogadorSnapshot.foto} size={48} />
        <div style={{ flex: 1, minWidth: 140 }}>
          <div style={{ fontSize: 16, fontWeight: 700 }}>{analise.jogadorSnapshot.nome} <span style={{ color: T.sub, fontWeight: 500, fontSize: 13 }}>#{analise.jogadorSnapshot.numero}</span></div>
          <div style={{ fontSize: 12, color: T.sub }}>{analise.jogadorSnapshot.posicao} · {club.nome}{adversario ? ` vs ${adversario.nome}` : ""} · {analise.tipoSessao}</div>
        </div>
        {analise.tipoSessao === "Jogo" && (
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 10, color: T.sub, fontWeight: 700 }}>{club.nome.split(" ")[0]}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <button disabled={ended} onClick={() => setScoreManual((s) => ({ ...s, casa: Math.max(0, s.casa - 1) }))} style={{ width: 22, height: 22, borderRadius: 11, background: T.card2, border: `1px solid ${T.sep}`, color: T.text, fontSize: 12, cursor: "pointer" }}>-</button>
                <div style={{ fontSize: 16, fontWeight: 800, minWidth: 16, textAlign: "center" }}>{scoreManual.casa}</div>
                <button disabled={ended} onClick={() => setScoreManual((s) => ({ ...s, casa: s.casa + 1 }))} style={{ width: 22, height: 22, borderRadius: 11, background: T.card2, border: `1px solid ${T.sep}`, color: T.text, fontSize: 12, cursor: "pointer" }}>+</button>
              </div>
            </div>
            <div style={{ fontSize: 13, color: T.sub }}>:</div>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 10, color: T.sub, fontWeight: 700 }}>{(adversario?.nome || "Adv").split(" ")[0]}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <button disabled={ended} onClick={() => setScoreManual((s) => ({ ...s, fora: Math.max(0, s.fora - 1) }))} style={{ width: 22, height: 22, borderRadius: 11, background: T.card2, border: `1px solid ${T.sep}`, color: T.text, fontSize: 12, cursor: "pointer" }}>-</button>
                <div style={{ fontSize: 16, fontWeight: 800, minWidth: 16, textAlign: "center" }}>{scoreManual.fora}</div>
                <button disabled={ended} onClick={() => setScoreManual((s) => ({ ...s, fora: s.fora + 1 }))} style={{ width: 22, height: 22, borderRadius: 11, background: T.card2, border: `1px solid ${T.sep}`, color: T.text, fontSize: 12, cursor: "pointer" }}>+</button>
              </div>
            </div>
          </div>
        )}
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, flexWrap: "wrap", marginBottom: 12 }}>
        <div style={{ fontSize: 20, fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>{fmtClock(seconds)}</div>
        <div style={{ fontSize: 11, color: T.sub }}>min {minutoTexto} · {periodoAtual} · {minutosAnalisados}' analisados</div>
        {!ended ? (
          <>
            {intervalo ? <span style={{ fontSize: 11, fontWeight: 700, color: T.warning, background: "rgba(255,214,10,0.15)", padding: "5px 10px", borderRadius: 8 }}>⏸ Intervalo</span> : <button onClick={alternarRunning} style={{ background: T.card2, border: `1px solid ${T.sep}`, color: T.text, borderRadius: 10, padding: "6px 12px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>{running ? "Pausar" : "Iniciar"}</button>}
            {intervalo ? <button onClick={iniciarSegundaParte} style={{ background: T.success, border: "none", color: "#000", borderRadius: 10, padding: "6px 12px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>▶️ 2ª Parte</button> : <button disabled={intervaloAos !== null} onClick={marcarIntervalo} style={{ background: "transparent", border: `1px solid ${T.sep}`, color: intervaloAos !== null ? T.sub : T.text, borderRadius: 10, padding: "6px 12px", fontSize: 11, fontWeight: 700, cursor: intervaloAos !== null ? "default" : "pointer", fontFamily: FONT }}>⏸ Intervalo</button>}
            <button onClick={desfazer} disabled={acoes.length === 0} style={{ background: "transparent", border: `1px solid ${T.sep}`, color: acoes.length === 0 ? T.sub : T.text, borderRadius: 10, padding: "6px 12px", fontSize: 11, fontWeight: 700, cursor: acoes.length === 0 ? "default" : "pointer", fontFamily: FONT }}>↩️ Desfazer</button>
            <button onClick={finalizar} style={{ background: "transparent", border: `1px solid ${T.danger}`, color: T.danger, borderRadius: 10, padding: "6px 12px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>🏁 Terminar</button>
          </>

      </div>

        <div style={{ textAlign: "center", fontSize: 11, color: T.warning, marginBottom: 8, fontWeight: 700 }}>

          <button onClick={() => setPendingRegistration(null)} style={{ marginLeft: 8, background: "none", border: "none", color: T.sub, textDecoration: "underline", cursor: "pointer", fontSize: 11, fontFamily: FONT }}>cancelar</button>
